    <!-- Multi-variable drag-and-drop: drop multiple selected variables to Top/Side at once -->
    <script>
    (function () {
      'use strict';

      var _multiDragNames = [];
      var _draggedVarName = '';

      function fiberOfMD(el) {
        var k = Object.keys(el).find(function (k) { return k.startsWith('__reactFiber'); });
        return k ? el[k] : null;
      }

      function varInfoMD(fiber) {
        var f = fiber;
        for (var i = 0; i < 12 && f; i++) {
          var p = f.memoizedProps;
          if (p && p.v && typeof p.v.name === 'string' && typeof p.onQuickAction === 'function') {
            return { varName: p.v.name, onQuickAction: p.onQuickAction };
          }
          f = f.return;
        }
        return null;
      }

      function findVarRowMD(el) {
        var e = el;
        while (e && e !== document.body) {
          if (e.draggable && typeof e.className === 'string' && e.className.includes('cursor-grab')) return e;
          e = e.parentElement;
        }
        return null;
      }

      function rowLooksSelectedMD(cls) {
        if (!cls || typeof cls !== 'string') return false;
        /* Selected variable row: bg-blue-50/70 ring-1 ring-blue-100 (bundle nx).
           Never match bare bg-blue-50 — unselected rows use hover:bg-blue-50, which contains that substring. */
        return cls.includes('bg-blue-50/70') && cls.includes('ring-blue-100');
      }

      function getSelectedVarNamesMD() {
        var selected = [];
        var allRows = document.querySelectorAll('[draggable="true"]');
        allRows.forEach(function (row) {
          var cls = typeof row.className === 'string' ? row.className : '';
          if (!cls.includes('cursor-grab') || !rowLooksSelectedMD(cls)) return;
          var f = fiberOfMD(row);
          if (!f) return;
          var info = varInfoMD(f);
          if (info) selected.push(info.varName);
        });
        return selected;
      }

      function getOnQuickActionMD() {
        var rows = document.querySelectorAll('[draggable="true"]');
        for (var i = 0; i < rows.length; i++) {
          var row = rows[i];
          if (!(row.className || '').includes('cursor-grab')) continue;
          var f = fiberOfMD(row);
          if (!f) continue;
          var info = varInfoMD(f);
          if (info && info.onQuickAction) return info.onQuickAction;
        }
        return null;
      }

      function getDropZoneType(el) {
        var e = el;
        while (e && e !== document.body) {
          var cls = typeof e.className === 'string' ? e.className : '';
          if (cls.includes('rounded-xl') && cls.includes('border-')) {
            var label = e.querySelector('.font-bold.uppercase');
            if (label) {
              var txt = (label.textContent || '').trim().toUpperCase();
              if (txt === 'TOP') return 'top';
              if (txt === 'SIDE') return 'side';
            }
          }
          e = e.parentElement;
        }
        return null;
      }

      document.addEventListener('dragstart', function (e) {
        _multiDragNames = [];
        _draggedVarName = '';
        var row = findVarRowMD(e.target);
        if (!row) return;
        var f = fiberOfMD(row);
        if (!f) return;
        var info = varInfoMD(f);
        if (!info) return;
        _draggedVarName = info.varName;
        var selected = getSelectedVarNamesMD();
        if (selected.length > 1 && selected.indexOf(_draggedVarName) !== -1) {
          _multiDragNames = selected;
        }
      }, true);

      /* capture: true — React onDrop calls stopPropagation(), so bubble listeners on document never run */
      document.addEventListener('drop', function (e) {
        if (_multiDragNames.length <= 1) return;
        var zone = getDropZoneType(e.target);
        if (!zone) { _multiDragNames = []; return; }
        var extraNames = _multiDragNames.filter(function (n) { return n !== _draggedVarName; });
        var namesCopy = extraNames.slice();
        var z = zone;
        _multiDragNames = [];
        _draggedVarName = '';
        if (namesCopy.length === 0) return;
        requestAnimationFrame(function () {
          var onQA = getOnQuickActionMD();
          if (!onQA) return;
          namesCopy.forEach(function (name) { onQA(name, z); });
        });
      }, true);

      document.addEventListener('dragend', function () {
        _multiDragNames = [];
        _draggedVarName = '';
      });
    })();
    </script>

    <!-- SIDE/TOP axis box layout fix: SIDE gets fixed height + vertical scroll, TOP stays single-row + horizontal scroll -->
    <script>
    (function () {
      'use strict';

      function applyAxisFixes() {
        var labels = document.querySelectorAll('.font-bold.uppercase.tracking-wide');
        for (var i = 0; i < labels.length; i++) {
          var txt = (labels[i].textContent || '').trim().toUpperCase();
          if (txt !== 'SIDE' && txt !== 'TOP') continue;

          var zone = labels[i].closest('.rounded-xl');
          if (!zone || zone.dataset.axisFixed === '1') continue;

          var isSide = (txt === 'SIDE');
          var isTop = (txt === 'TOP');

          if (isSide) {
            zone.style.height = '390px';
            zone.style.minWidth = '240px';
            zone.style.maxWidth = '320px';
            zone.style.width = 'min(100%, 320px)';
            zone.style.overflow = 'hidden';

            var outerFlex = zone.querySelector('.flex.items-start');
            if (outerFlex) {
              outerFlex.style.height = '100%';
            }

            var innerCol = zone.querySelector('.flex-1.min-w-0');
            if (innerCol) {
              innerCol.style.height = '100%';
              innerCol.style.display = 'flex';
              innerCol.style.flexDirection = 'column';
              innerCol.style.overflow = 'hidden';
            }

            var itemsList = zone.querySelector('.flex.flex-col.gap-px');
            if (itemsList) {
              itemsList.style.flex = '1 1 0%';
              itemsList.style.minHeight = '0';
              itemsList.style.overflowY = 'auto';
              itemsList.style.scrollbarWidth = 'thin';
              itemsList.style.paddingRight = '4px';
            }

            var emptyMsg = zone.querySelector('.border-dashed');
            if (emptyMsg) {
              emptyMsg.style.flex = '1 1 0%';
              emptyMsg.style.minHeight = '0';
            }
          }

          if (isTop) {
            zone.style.overflow = 'hidden';

            var itemsWrap = zone.querySelector('.flex.flex-wrap');
            if (itemsWrap) {
              itemsWrap.style.flexWrap = 'nowrap';
              itemsWrap.style.overflowX = 'auto';
              itemsWrap.style.overflowY = 'hidden';
              itemsWrap.style.scrollbarWidth = 'thin';
              itemsWrap.style.maxWidth = '100%';
            }
          }

          zone.dataset.axisFixed = '1';
        }
      }

      var obs = new MutationObserver(function () {
        document.querySelectorAll('.rounded-xl[data-axis-fixed]').forEach(function (el) {
          el.removeAttribute('data-axis-fixed');
        });
        applyAxisFixes();
      });
      obs.observe(document.body, { childList: true, subtree: true });
      setInterval(function () {
        document.querySelectorAll('.rounded-xl[data-axis-fixed]').forEach(function (el) {
          var itemsList = el.querySelector('.flex.flex-col.gap-px');
          if (itemsList && itemsList.style.overflowY !== 'auto') {
            el.removeAttribute('data-axis-fixed');
          }
          var itemsWrap = el.querySelector('.flex.flex-wrap, [style*="flex-wrap: nowrap"]');
          if (itemsWrap && !itemsWrap.style.overflowX) {
            el.removeAttribute('data-axis-fixed');
          }
        });
        applyAxisFixes();
      }, 400);
    })();
    </script>

        if (node.k === 'cmp') return { k: 'cmp', o: node.o, l: normalizeExprAst(node.l), r: normalizeExprAst(node.r) };

        if (node.k === 'and' || node.k === 'or') return { k: node.k, l: normalizeExprAst(node.l), r: normalizeExprAst(node.r) };
        return node;
      }

      function openModal(editVarName) {
        if (_modal) return;
        _hook = getDatasetHook();
        if (!_hook) { alert('กรุณาโหลดไฟล์ SPSS ก่อน'); return; }
        var allDatasetVars = _hook.data.variables || [];
        var byName = Object.create(null);
        allDatasetVars.forEach(function(v){ byName[v.name] = v; });
        var folderVarObjs = getVarObjectsFromFolderFiberProps();
        var folderNames = folderVarObjs.map(function(v){ return v && v.name; }).filter(Boolean);
        if (folderNames.length === 0) folderNames = getVarNamesFromFolderFiberProps();
        if (folderNames.length === 0) folderNames = getVisibleFolderVarNames();
        var picked = [];
        var pickedNameSet = Object.create(null);
        folderVarObjs.forEach(function(fv){
          if (!fv || !fv.name || pickedNameSet[fv.name]) return;
          var merged = Object.assign({}, fv, byName[fv.name] || {});
          picked.push(merged);
          pickedNameSet[fv.name] = true;
        });
        folderNames.forEach(function(n){
          if (!n || pickedNameSet[n] || !byName[n]) return;
          picked.push(byName[n]);
          pickedNameSet[n] = true;
        });
        if (picked.length === 0) {
          picked = allDatasetVars.slice();
        }
        _allVars = picked.map(function(v){
            var next = Object.assign({}, v);
            next.displayName = resolveVarDisplayName(v);
            return next;
          });
        var usedExprTokens = Object.create(null);
        _exprTokenToVar = Object.create(null);
        _allVars.forEach(function(v) {
          v.exprToken = resolveVarExprToken(v, usedExprTokens);
          _exprTokenToVar[String(v.name || '').trim().toUpperCase()] = v.name;
          _exprTokenToVar[String(v.exprToken || '').trim().toUpperCase()] = v.name;
          if (v.displayName && isUsableExprToken(v.displayName)) {
            _exprTokenToVar[String(v.displayName).trim().toUpperCase()] = v.name;
          }
        });
        if (_allVars.length === 0) { alert('ไม่พบตัวแปรใน Variable Folders'); return; }
        _filterQ = '';
        _editingVarName = editVarName || null;
        if (_editingVarName && byName[_editingVarName]) {
          var ev = byName[_editingVarName];
          _rules = (ev._derivedRules && ev._derivedRules.length > 0)
            ? ev._derivedRules.map(function(r){ return JSON.parse(JSON.stringify(r)); })
            : [{ id: uid(), conditions: [], expression: '', newCode: '1', newLabel: '' }];
          _activeTab = 'create';
        } else {
          _rules = [{ id: uid(), conditions: [], expression: '', newCode: '1', newLabel: '' }];
          _activeTab = editVarName === '__manage__' ? 'manage' : 'create';
          _editingVarName = null;
        }
        buildModal();
      }

      function insertVarToken(textarea, varName) {
        var start = textarea.selectionStart || 0;
        var end = textarea.selectionEnd || start;
        var left = textarea.value.slice(0, start);
        var right = textarea.value.slice(end);
        var needLeft = left.length > 0 && !/\s|\(|&|\||!|=|<|>$/.test(left);
        var needRight = right.length > 0 && !/^\s|\)|&|\||!|=|<|>/.test(right);
        var token = (needLeft ? ' ' : '') + varName + (needRight ? ' ' : '');
        textarea.value = left + token + right;
        var caret = left.length + token.length;
        textarea.selectionStart = textarea.selectionEnd = caret;
      }

      function tokenizeExpr(input) {
        var src = String(input || '');
        var i = 0;
        var out = [];
        while (i < src.length) {
          var c = src[i];
          if (/\s/.test(c)) { i++; continue; }
          if (c === '(' || c === ')') { out.push({ t: c, v: c, p: i++ }); continue; }
          if (c === '&' || c === '|') { out.push({ t: 'L', v: src[i + 1] === c ? (i++, c + c) : c, p: i++ }); continue; }
          if (c === '!') { out.push({ t: src[i + 1] === '=' ? 'O' : 'N', v: src[i + 1] === '=' ? (i++, '!=') : '!', p: i++ }); continue; }
          if (c === '<' || c === '>') {
            if (src[i + 1] === '=') { out.push({ t: 'O', v: c + '=', p: i }); i += 2; continue; }
            if (c === '<' && src[i + 1] === '>') { out.push({ t: 'O', v: '!=', p: i }); i += 2; continue; }
            out.push({ t: 'O', v: c, p: i++ }); continue;
          }
          if (c === '=') { out.push({ t: 'O', v: src[i + 1] === '=' ? (i++, '==') : '=', p: i++ }); continue; }
          if (c === '"' || c === "'") {
            var q = c; var p = i++; var str = '';
            while (i < src.length && src[i] !== q) str += src[i++];
            if (i >= src.length) throw new Error('Unclosed string at ' + p);
            i++;
            out.push({ t: 'S', v: str, p: p });
            continue;
          }
          if (/[0-9.]/.test(c)) {
            var ns = i;
            while (i < src.length && /[0-9.]/.test(src[i])) i++;
            var raw = src.slice(ns, i);
            if (!/^\d+(\.\d+)?$/.test(raw)) throw new Error('Invalid number "' + raw + '" at ' + ns);
            out.push({ t: 'M', v: Number(raw), p: ns });
            continue;
          }
          if (/[A-Za-z_$]/.test(c)) {
            var ws = i;
            while (i < src.length && /[A-Za-z0-9_$]/.test(src[i])) i++;
            var w = src.slice(ws, i);
            var u = w.toUpperCase();
            if (u === 'AND' || u === 'OR') out.push({ t: 'L', v: u, p: ws });
            else if (u === 'NOT') out.push({ t: 'N', v: 'NOT', p: ws });
            else out.push({ t: 'I', v: w, p: ws });
            continue;
          }
          throw new Error('Unexpected "' + c + '" at ' + i);
        }
        out.push({ t: 'E', v: '', p: src.length });
        return out;
      }

      function parseExpr(tokens) {
        var p = 0;
        var used = new Set();
        function cur() { return tokens[p]; }
        function eat(t) { return cur().t === t ? tokens[p++] : null; }
        function req(t, m) { if (!eat(t)) throw new Error(m + ' at ' + cur().p); }
        function primary() {
          var t = cur();
          if (eat('(')) { var e = orExpr(); req(')', 'Expected )'); return e; }
          if (eat('M')) return { k: 'lit', v: t.v };
          if (eat('S')) return { k: 'lit', v: t.v };
          if (eat('I')) { used.add(t.v); return { k: 'var', n: t.v }; }
          throw new Error('Expected value at ' + t.p);
        }
        function cmpExpr() {
          var l = primary();
          var o = cur().t === 'O' ? tokens[p++] : null;
          if (!o) return l;
          return { k: 'cmp', o: o.v, l: l, r: primary() };
        }
        function unary() { return eat('N') ? { k: 'not', e: unary() } : cmpExpr(); }
        function andExpr() { var n = unary(); while (cur().t === 'L' && (cur().v === '&' || cur().v === '&&' || cur().v === 'AND')) { p++; n = { k: 'and', l: n, r: unary() }; } return n; }
        function orExpr() { var n = andExpr(); while (cur().t === 'L' && (cur().v === '|' || cur().v === '||' || cur().v === 'OR')) { p++; n = { k: 'or', l: n, r: andExpr() }; } return n; }
        var ast = orExpr();
        if (cur().t !== 'E') throw new Error('Unexpected token at ' + cur().p);
        return { ast: ast, used: Array.from(used) };
      }

      function toNum(v) { var n = Number(v); return Number.isFinite(n) ? n : NaN; }
      function cmpVals(a, b, op) {
        var an = toNum(a), bn = toNum(b), both = Number.isFinite(an) && Number.isFinite(bn);
        if (op === '=' || op === '==') return both ? an === bn : String(a) === String(b);
        if (op === '!=') return both ? an !== bn : String(a) !== String(b);
        if (!both) return false;
        if (op === '>') return an > bn;
        if (op === '>=') return an >= bn;
        if (op === '<') return an < bn;
        if (op === '<=') return an <= bn;
        return false;
      }

      function evalExprAst(node, row) {
        if (!node) return false;
        if (node.k === 'lit') return node.v;
        if (node.k === 'var') return row[node.n];
        if (node.k === 'cmp') return cmpVals(evalExprAst(node.l, row), evalExprAst(node.r, row), node.o);
        if (node.k === 'not') return !Boolean(evalExprAst(node.e, row));
        if (node.k === 'and') return Boolean(evalExprAst(node.l, row)) && Boolean(evalExprAst(node.r, row));
        if (node.k === 'or') return Boolean(evalExprAst(node.l, row)) || Boolean(evalExprAst(node.r, row));
        return false;
      }

      function validateExpression(expr) {
        var source = String(expr || '').trim();
        if (!source) return { ok: false, error: 'Expression is required' };
        try {
          var parsed = parseExpr(tokenizeExpr(source));
          var miss = parsed.used.filter(function (name) { return !toExprVarName(name); });
          if (miss.length > 0) return { ok: false, error: 'Unknown variable: ' + miss.join(', ') };
          return { ok: true, ast: normalizeExprAst(parsed.ast), used: parsed.used };
        } catch (err) {
          return { ok: false, error: err && err.message ? err.message : 'Invalid expression' };
        }
      }

      /* ── Multi row-var tables: Vo skips Li/Qn — rebuild per-section TB/T2B + Mean ── */
      function cxJtAxis(a) {
        var used = Object.create(null);
        var u = [];
        (a || []).forEach(function(d) {
          var p = d.filter(Boolean);
          if (!p.length) return;
          var m = p.join('\x1f');
          if (used[m]) return;
          used[m] = true;
          u.push(p);
        });
        return u;
      }

      /* PreviewTable with rowSectionBases uses rowPaths[i].slice(1) for label cells — need depth ≥ 2 */
      function cxRowPathForInjected(result, lo, hi, labelText) {
        var lo0 = lo == null ? 0 : lo;
        var hi0 = hi == null ? (result.rowValues || []).length : hi;
        for (var ri = lo0; ri < hi0; ri++) {
          var pp = result.rowPaths && result.rowPaths[ri];
          if (!pp || pp.length < 2) continue;
          var t0 = (result.rowTypes && result.rowTypes[ri]) || 'data';
          if (t0 === 'stat' || t0 === 'summary' || t0 === 'net') continue;
          return pp.slice(0, -1).concat([labelText]);
        }
        var ll = (result.rowLevelLabels || []).length;
        if (ll >= 2) return ['', labelText];
        return [labelText];
      }

      function cxInferBases(result) {
        var paths = result.rowPaths || [];
        var bases = [];
        for (var j = 0; j < paths.length; j++) {
          var p2 = paths[j];
          if (!p2 || p2.length < 2) continue;
          var h = p2[0];
          var pprev = j > 0 ? paths[j - 1] : null;
          var hprev = (pprev && pprev.length >= 2) ? pprev[0] : null;
          if (h !== hprev) {
            bases.push({
              startIndex: j,
              label: h,
              totalN: 0,
              colTotalsN: (result.colValues || []).map(function() { return 0; })
            });
          }
        }
        if (result.rowSectionBases && result.rowSectionBases.length === bases.length) {
          for (var k = 0; k < bases.length; k++) {
            bases[k].totalN = result.rowSectionBases[k].totalN;
            bases[k].colTotalsN = (result.rowSectionBases[k].colTotalsN || []).slice();
          }
        }
        return bases;
      }

      function cxSectionExtraRows(result, lo, hi, vName, overrides) {
        var extra = [];
        var colCount = (result.colValues || []).length;
        ensureTbInfoExpanded(vName);
        var stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        var info = stored[vName];
        var ov = overrides && overrides[vName];
        var weights = ov && ov.weights;
        var labels = (ov && ov.labels) || {};
        var weightsOk = weights && Object.keys(weights).some(function(k) {
          var v = weights[k];
          return v != null && String(v).trim() !== '' && String(v).trim() !== '-';
        });
        if (!weightsOk && typeof window.__cxResolveMeanWeights === 'function') {
          var autoMw = window.__cxResolveMeanWeights(vName, overrides);
          if (autoMw && Object.keys(autoMw).length) {
            weights = autoMw;
            labels = Object.assign({}, labels, (info && info.memberLabels) || {});
          }
        }

        var labelToIdx = {};
        for (var ri = lo; ri < hi; ri++) {
          var t0 = (result.rowTypes && result.rowTypes[ri]) || 'data';
          if (t0 === 'stat' || t0 === 'summary' || t0 === 'net') continue;
          var rv = result.rowValues[ri];
          var path = (result.rowPaths && result.rowPaths[ri]) || [rv];
          var last = path[path.length - 1];
          labelToIdx[rv] = ri;
          labelToIdx[String(last).trim()] = ri;
        }

        if (info && info.summaries && info.summaries.length) {
          info.summaries.forEach(function(sum) {
            var memberIdxs = [];
            (sum.members || []).forEach(function(mCode) {
              var lbl = (info.memberLabels || {})[mCode] || mCode;
              if (labelToIdx[lbl] != null) memberIdxs.push(labelToIdx[lbl]);
            });
            var sumCounts = [];
            for (var ci = 0; ci < colCount; ci++) {
              var s = 0;
              memberIdxs.forEach(function(rix) { s += (result.counts[rix] || [])[ci] || 0; });
              sumCounts.push(s);
            }
            extra.push({
              rv: sum.code,
              rt: 'summary',
              rp: cxRowPathForInjected(result, lo, hi, sum.code),
              ct: sumCounts,
              rtn: sumCounts.reduce(function(a, b) { return a + b; }, 0)
            });
          });
        }

        if (weights && Object.keys(weights).length) {
          var labelToCode = {};
          Object.keys(weights).forEach(function(code) {
            var lab = labels[code] || (info && info.memberLabels && info.memberLabels[code]);
            if (lab != null && String(lab).trim() !== '') labelToCode[String(lab).trim()] = code;
          });
          var stats = (ov && ov.numericStats && ov.numericStats.length) ? ov.numericStats : ['mean'];
          stats.forEach(function(st) {
            if (st !== 'mean') return;
            var lblOut = st === 'stddev' ? 'StdDev' : st.charAt(0).toUpperCase() + st.slice(1);
            var cellVals = [];
            for (var ci = 0; ci < colCount; ci++) {
              var num = 0, den = 0;
              for (var ri = lo; ri < hi; ri++) {
                var t1 = (result.rowTypes && result.rowTypes[ri]) || 'data';
                if (t1 === 'stat' || t1 === 'summary' || t1 === 'net') continue;
                var path1 = (result.rowPaths && result.rowPaths[ri]) || [];
                var last1 = String(path1[path1.length - 1] || result.rowValues[ri] || '').trim();
                var code1 = labelToCode[last1];
                if (code1 == null) {
                  for (var lk in labelToCode) {
                    if (result.rowValues[ri].indexOf(lk) !== -1) { code1 = labelToCode[lk]; break; }
                  }
                }
                if (code1 == null) continue;
                var wf = Number(weights[code1]);
                if (!isFinite(wf)) continue;
                var cnt = (result.counts[ri] || [])[ci] || 0;
                num += wf * cnt;
                den += cnt;
              }
              cellVals.push(den > 0 ? Number((num / den).toFixed(2)) : 0);
            }
            var numT = 0, denT = 0;
            for (var ri2 = lo; ri2 < hi; ri2++) {
              var t2 = (result.rowTypes && result.rowTypes[ri2]) || 'data';
              if (t2 === 'stat' || t2 === 'summary' || t2 === 'net') continue;
              var path2 = (result.rowPaths && result.rowPaths[ri2]) || [];
              var last2 = String(path2[path2.length - 1] || result.rowValues[ri2] || '').trim();
              var code2 = labelToCode[last2];
              if (code2 == null) {
                for (var lk2 in labelToCode) {
                  if (result.rowValues[ri2].indexOf(lk2) !== -1) { code2 = labelToCode[lk2]; break; }
                }
              }
              if (code2 == null) continue;
              var wf2 = Number(weights[code2]);
              if (!isFinite(wf2)) continue;
              var rt = result.rowTotalsN[ri2] || 0;
              numT += wf2 * rt;
              denT += rt;
            }
            extra.push({
              rv: lblOut,
              rt: 'stat',
              rp: cxRowPathForInjected(result, lo, hi, lblOut),
              ct: cellVals,
              rtn: denT > 0 ? Number((numT / denT).toFixed(2)) : 0
            });
          });
        }

        return extra;
      }

      window.__cxAugmentStackedTable = function(result, rowAxisO, colAxisT, overrides, rowGrouped, caseBundle) {
        if (!result || !result.rowValues || !result.rowValues.length) return result;
        var bases = (result.rowSectionBases && result.rowSectionBases.length)
          ? result.rowSectionBases.map(function(b) {
              return { startIndex: b.startIndex, label: b.label, totalN: b.totalN, colTotalsN: (b.colTotalsN || []).slice() };
            })
          : cxInferBases(result);
        if (bases.length <= 1) return result;

        var branches = cxJtAxis(rowAxisO);
        var branchVars = branches.map(function(b) { return b[0]; });
        var chainVars = branches.length === 1 && branches[0].length > 1 ? branches[0] : null;
        var n = result.rowValues.length;

        var rv = [], rt = [], rp = [], ct = [], rtn = [];
        var newBases = [];
        var outIdx = 0;

        function pushRow(o) {
          rv.push(o.rv);
          rt.push(o.rt);
          rp.push(o.rp);
          ct.push(o.ct);
          rtn.push(o.rtn);
          outIdx++;
        }

        for (var s = 0; s < bases.length; s++) {
          var lo = bases[s].startIndex;
          var hi = s + 1 < bases.length ? bases[s + 1].startIndex : n;
          newBases.push({
            startIndex: outIdx,
            label: bases[s].label,
            totalN: bases[s].totalN,
            colTotalsN: (bases[s].colTotalsN || []).slice()
          });
          for (var ri = lo; ri < hi; ri++) {
            var rtt = (result.rowTypes && result.rowTypes[ri]) || 'data';
            pushRow({
              rv: result.rowValues[ri],
              rt: rtt,
              rp: (result.rowPaths && result.rowPaths[ri]) ? result.rowPaths[ri].slice() : [result.rowValues[ri]],
              ct: (result.counts[ri] || []).slice(),
              rtn: result.rowTotalsN[ri] || 0
            });
          }
          var vName = (chainVars && chainVars[s]) || branchVars[s] || branchVars[0];
          var extras = cxSectionExtraRows(result, lo, hi, vName, overrides || {});
          for (var ex = 0; ex < extras.length; ex++) {
            pushRow(extras[ex]);

        return Object.assign({}, result, {
          rowValues: rv,
          rowTypes: rt,
          rowPaths: rp,
          counts: ct,
          rowTotalsN: rtn,
          rowSectionBases: newBases
        });
      };

      /* ── Engine-level summary injection (called from patched Qn in bundle) ── */
      window.__cxAddSummary = function(result, varName) {
        ensureTbInfoExpanded(varName);
        var stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        var info = stored[varName];
        if (!info || !info.summaries || !info.summaries.length) return result;
        if (!result || !result.rowValues || !result.rowValues.length) return result;

        var memberLabels = info.memberLabels || {};
        var n = result.rowValues.length;
        var rawTypes = result.rowTypes;
        if (!Array.isArray(rawTypes) || rawTypes.length !== n) {
          rawTypes = result.rowValues.map(function() { return 'data'; });
        }
        var rowTypes = result.rowValues.map(function(rv, idx) {
          var t = rawTypes[idx];
          if (t === 'stat' || t === 'summary' || t === 'net' || t === 'data') return t;
          var lab = String(rv || '').trim();
          if (/^mean$/i.test(lab) || /^min$/i.test(lab) || /^max$/i.test(lab) || /^stddev$/i.test(lab)) return 'stat';
          return t != null && t !== '' ? t : 'data';
        });
        var rowPaths = result.rowPaths && result.rowPaths.length === n
          ? result.rowPaths
          : result.rowValues.map(function(v) { return [v]; });

        var existingSumCodes = {};
        result.rowValues.forEach(function(v, idx) {
          if (rowTypes[idx] === 'summary') existingSumCodes[v] = true;
        });

        var hasNew = info.summaries.some(function(s) { return !existingSumCodes[s.code]; });
        if (!hasNew) return result;

        var insertIdx = n;
        for (var si = 0; si < n; si++) {
          if (rowTypes[si] === 'stat') { insertIdx = si; break; }
        }

        var before   = { rv: [], rt: [], rp: [], ct: [], rtn: [] };
        var after    = { rv: [], rt: [], rp: [], ct: [], rtn: [] };
        for (var k = 0; k < result.rowValues.length; k++) {
          var target = k < insertIdx ? before : after;
          target.rv.push(result.rowValues[k]);
          target.rt.push(rowTypes[k]);
          target.rp.push(rowPaths[k]);
          target.ct.push(result.counts[k]);
          target.rtn.push(result.rowTotalsN[k]);
        }

        var labelToIdx = {};
        result.rowValues.forEach(function(v, idx) {
          if (rowTypes[idx] !== 'stat' && rowTypes[idx] !== 'summary') labelToIdx[v] = idx;
        });

        info.summaries.forEach(function(sum) {
          if (existingSumCodes[sum.code]) return;
          var memberIdxs = [];
          (sum.members || []).forEach(function(mCode) {
            var lbl = memberLabels[mCode] || mCode;
            if (labelToIdx[lbl] != null) memberIdxs.push(labelToIdx[lbl]);
          });

          var colCount = (result.colValues || []).length;
          var sumCounts = [];
          for (var ci = 0; ci < colCount; ci++) {
            var s = 0;
            memberIdxs.forEach(function(ri) { s += (result.counts[ri] || [])[ci] || 0; });
            sumCounts.push(s);
          }
          var sumTotal = sumCounts.reduce(function(a, b) { return a + b; }, 0);

          before.rv.push(sum.code);
          before.rt.push('summary');
          before.rp.push(cxRowPathForInjected(result, null, null, sum.code));
          before.ct.push(sumCounts);
          before.rtn.push(sumTotal);
        });

        return Object.assign({}, result, {
          rowValues:  before.rv.concat(after.rv),
          rowTypes:   before.rt.concat(after.rt),
          rowPaths:   before.rp.concat(after.rp),
          counts:     before.ct.concat(after.ct),
          rowTotalsN: before.rtn.concat(after.rtn)
        });
      };

      /* Style summary rows in the results table */
      function styleResultSummaryRows() {
        document.querySelectorAll('table').forEach(function(tbl) {
          tbl.querySelectorAll('tr').forEach(function(tr) {
            var cells = tr.querySelectorAll('td,th');
            if (!cells.length) return;
            var code = (cells[cells.length > 1 ? cells.length - 1 : 0].textContent || '').trim();
            var first = (cells[0].textContent || '').trim();
            if (!SUMMARY_SET[first] && !SUMMARY_SET[code]) return;
            tr.style.background = '#fffbeb';
            tr.style.fontWeight = '600';
          });
        });
      }

      var _styleTimer = null;
      new MutationObserver(function() {
        if (_styleTimer) clearTimeout(_styleTimer);
        _styleTimer = setTimeout(styleResultSummaryRows, 200);
      }).observe(document.body, { childList: true, subtree: true });

      /* ── Excel Save/Load hooks for TB_Setting sheet ── */
      var TB_DISPLAY = {
        'tb_low_good':   'TB (1 ดี)',
        'tb_high_good':  'TB (5 ดี)',
        't2b_low_good':  'T2B (1 ดี)',
        't2b_high_good': 'T2B (5 ดี)',
        't3b_low_good':  'T3B (1 ดี)',
        't3b_high_good': 'T3B (5 ดี)',
        'justright_02':  'Justright (0-2)',
        'justright_code': 'Justright (Normal)'
      };
      var TB_REVERSE = {};
      Object.keys(TB_DISPLAY).forEach(function(k) { TB_REVERSE[TB_DISPLAY[k]] = k; });

      window.__cxWriteTBSheet = function(wb, variableOverrides) {
        var stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        var vars = Object.keys(stored);
        if (!vars.length) return;

        var ws = wb.addWorksheet('TB_Setting');
        ws.getColumn(1).width = 28;
        ws.getColumn(2).width = 36;

        var hdr = ws.addRow(['Variable', 'Preset']);
        hdr.height = 20;
        [1, 2].forEach(function(c) {
          var cell = hdr.getCell(c);
          cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
          cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F4E78' } };
        });

        vars.sort().forEach(function(vName, idx) {
          var info = stored[vName];
          if (!info || !info.preset) return;
          var label = TB_DISPLAY[info.preset] || info.preset;
          var row = ws.addRow([vName, label]);
          row.height = 18;
          if (idx % 2 === 1) {
            [1, 2].forEach(function(c) {
              row.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEBF3FB' } };
            });
          }
        });
      };

      window.__cxReadTBSheet = function(wb, variableOverrides) {
        var ws = wb.worksheets.find(function(s) { return s.name.toLowerCase() === 'tb_setting'; })
               || wb.getWorksheet('TB_Setting');
        if (!ws) return;

        var stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        var changed = false;
        var ov = variableOverrides || {};

        for (var r = 2; r <= ws.rowCount; r++) {
          var row = ws.getRow(r);
          var vName = String(row.getCell(1).value || '').trim();
          var presetLabel = String(row.getCell(2).value || '').trim();
          if (!vName || !presetLabel) continue;

          var presetId = TB_REVERSE[presetLabel] || presetLabel.trim();
          if (!TB_DISPLAY[presetId]) {
            for (var k in TB_DISPLAY) {
              if (TB_DISPLAY[k].toLowerCase() === presetLabel.toLowerCase()) { presetId = k; break; }
            }
          }
          if (!TB_DISPLAY[presetId] && PRESETS.some(function(p) { return p.id === presetLabel.trim(); })) {
            presetId = presetLabel.trim();
          }
          if (!TB_DISPLAY[presetId]) continue;

          var base = { preset: presetId };
          var expanded = expandTbStoredEntry(base, ov[vName], vName);
          var gotML = expanded && expanded.memberLabels && Object.keys(expanded.memberLabels).length;
          var gotSum = expanded && expanded.summaries && expanded.summaries.length;
          stored[vName] = (gotML && (gotSum || isFactorOnlyPreset(presetId))) ? expanded : base;
          changed = true;
        }

        if (changed) {
          Object.keys(stored).forEach(function(vn) {
            var ent = stored[vn];
            if (!ent || !ent.preset) return;
            if (ent.memberLabels && Object.keys(ent.memberLabels).length) return;
            var ex = expandTbStoredEntry(ent, ov[vn], vn);
            if (ex && ex.memberLabels && Object.keys(ex.memberLabels).length && (ex.summaries && ex.summaries.length || isFactorOnlyPreset(ent.preset))) {
              stored[vn] = ex;
            }
          });
          localStorage.setItem(LS_KEY, JSON.stringify(stored));
        }
      };

      /* ── MutationObserver: watch for modal open/close ── */
      var _currentModal = null;

      var mainObs = new MutationObserver(function(mutations) {
        mutations.forEach(function(mut) {
          mut.addedNodes.forEach(function(node) {
            if (node.nodeType !== 1) return;
            var h3s = node.querySelectorAll ? node.querySelectorAll('h3') : [];
            if (node.tagName === 'H3') { var tmp = [node]; h3s = tmp; }
            for (var i = 0; i < h3s.length; i++) {
              if (h3s[i].textContent && h3s[i].textContent.startsWith('Edit Variable - ')) {
                var mEl = h3s[i];
                while (mEl && mEl !== document.body) {
                  if (typeof mEl.className === 'string' && mEl.className.indexOf('fixed') !== -1 && mEl.className.indexOf('inset-0') !== -1) break;
                  mEl = mEl.parentElement;
                }
                if (mEl && mEl !== document.body) {
                  _currentModal = mEl;
                  setTimeout(function(m) { return function() { injectButton(m); }; }(mEl), 80);
                }
                break;
              }
            }
          });
          mut.removedNodes.forEach(function(node) {
            if (_currentModal && (node === _currentModal || (node.contains && node.contains(_currentModal)))) {
              _currentModal = null;
              if (_rowStylerObs) { _rowStylerObs.disconnect(); _rowStylerObs = null; }
              closeDialog();
            }
          });
        });
      });
      mainObs.observe(document.body, { childList: true, subtree: true });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && _dialog) closeDialog();
      });

    })();
    </script>
  </body>
