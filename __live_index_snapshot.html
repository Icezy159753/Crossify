    <!-- Right-click Copy/Paste/Delete for Tables List � injected without touching the bundle -->
    <script>
    (function () {
      'use strict';

      var COPY_KEY = '__cx_tbl_copy__';
      var menuEl = null;
      var lastRowFiber = null; // captured at right-click time

      /* ?? React fiber helpers ?? */
      function fiberOf(el) {
        var k = Object.keys(el).find(function (k) { return k.startsWith('__reactFiber'); });
        return k ? el[k] : null;
      }

      // Walk up fiber tree until we find a node whose memoizedProps has a
      // `table` object with id + colVar (that's the TableRow component fiber)
      function tablePropsFromFiber(fiber) {
        var f = fiber;
        for (var i = 0; i < 8 && f; i++) {
          var p = f.memoizedProps;
          if (p && p.table && typeof p.table.id === 'string' && 'colVar' in p.table) {
            return p.table;
          }
          f = f.return;
        }
        return null;
      }

      // Walk UP the fiber tree from startFiber, searching every component's
      // hook chain for an array-of-tables hook {id, colVar, rowVar}.
      // This is more reliable than going from #root down.
      function dispatchTables(startFiber, updaterFn) {
        var f = startFiber;
        while (f) {
          var s = f.memoizedState;
          while (s) {
            var v = s.memoizedState;
            if (Array.isArray(v) && v.length > 0 && v[0] &&
                typeof v[0].id === 'string' && 'colVar' in v[0] && 'rowVar' in v[0]) {
              s.queue.dispatch(updaterFn);
              return true;
            }
            s = s.next;
          }
          f = f.return;
        }
        return false;
      }

      /* ?? DOM helpers ?? */
      function findTableRow(el) {
        var e = el;
        while (e && e !== document.body) {
          if (e.draggable &&
              typeof e.className === 'string' &&
              e.className.includes('border-l-2') &&
              e.className.includes('cursor-pointer')) {
            return e;
          }
          e = e.parentElement;
        }
        return null;
      }

      // Returns all checked/selected table rows' data.
      // "selected" rows have bg-blue-50/70 (checked checkbox), active has bg-blue-50 border-[#1F4E78].
      function getAllCheckedTables() {
        var result = [];
        var allRows = document.querySelectorAll('[draggable="true"]');
        allRows.forEach(function (row) {
          var cls = typeof row.className === 'string' ? row.className : '';
          if (!cls.includes('border-l-2') || !cls.includes('cursor-pointer')) return;
          // Only selected (checkbox) rows � has bg-blue-50/70 which means it contains 'bg-blue-50'
          // but we distinguish from active (border-[#1F4E78]) by checking for 'border-blue-200'
          if (!cls.includes('bg-blue-50')) return;
          var f = fiberOf(row);
          if (!f) return;
          var t = tablePropsFromFiber(f);
          if (t) result.push(t);
        });
        return result;
      }

      // Returns active table (dark blue border) fiber and data, for paste anchor.
      function getActiveTableRow() {
        var allRows = document.querySelectorAll('[draggable="true"]');
        for (var i = 0; i < allRows.length; i++) {
          var row = allRows[i];
          var cls = typeof row.className === 'string' ? row.className : '';
          if (cls.includes('border-[#1F4E78]') && cls.includes('border-l-2')) {
            var f = fiberOf(row);
            var t = f ? tablePropsFromFiber(f) : null;
            if (t) return { fiber: f, table: t };
          }
        }
        return null;
      }

      // Collect tables to copy: all selected rows if right-clicked table is among them.
      function getSelectedForCopy(rightClickedTable) {
        var checked = getAllCheckedTables();
        var inSel = checked.some(function (t) { return t.id === rightClickedTable.id; });
        return (inSel && checked.length > 1) ? checked : [rightClickedTable];
      }

      // Collect IDs to delete: all selected if right-clicked table is among them.
      function getSelectedIdsForDelete(rightClickedId) {
        var checked = getAllCheckedTables();
        var inSel = checked.some(function (t) { return t.id === rightClickedId; });
        return (inSel && checked.length > 1)
          ? checked.map(function (t) { return t.id; })
          : [rightClickedId];
      }

      /* ?? Context menu ?? */
      function removeMenu() {
        if (menuEl) { menuEl.remove(); menuEl = null; }
      }

      var SVG_COPY  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      var SVG_PASTE = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>';

      function makeBtn(label, svgIcon, danger, onClick) {
        var b = document.createElement('button');
        b.style.cssText = [
          'display:flex', 'align-items:center', 'gap:8px', 'width:100%',

      function showMenu(x, y, table) {
        removeMenu();

        var selectedForCopy = getSelectedForCopy(table);
        var copied = [];
        try { copied = JSON.parse(localStorage.getItem(COPY_KEY) || '[]'); } catch (e) {}

        menuEl = document.createElement('div');
        menuEl.style.cssText = [
          'position:fixed', 'z-index:2147483647',

        // Copy � copies all selected tables if right-clicked table is in the selection
        menuEl.appendChild(makeBtn('Copy' + (selectedForCopy.length > 1 ? ' (' + selectedForCopy.length + ')' : ''), SVG_COPY, false, function () {
          try { localStorage.setItem(COPY_KEY, JSON.stringify(selectedForCopy)); } catch (e) {}
          removeMenu();

        // Paste (only shown when buffer has data)
        if (copied.length > 0) {
          menuEl.appendChild(makeBtn('Paste (' + copied.length + ')', SVG_PASTE, false, function () {
            var tid = table.id;
            var capFiber = lastRowFiber;
            var ok = dispatchTables(capFiber, function (prev) {
              var idx = prev.findIndex(function (t) { return t.id === tid; });
              var ins = copied.map(function (t) {
                return Object.assign({}, t, { id: crypto.randomUUID(), result: null });
              });
              return idx >= 0
                ? prev.slice(0, idx + 1).concat(ins, prev.slice(idx + 1))
                : prev.concat(ins);
            });
            if (!ok) alert('Paste failed � could not reach React state.');
            removeMenu();
          }));
        }

        // Separator
        var sep = document.createElement('div');
        sep.style.cssText = 'height:1px;background:#f3f4f6;margin:4px 0';
        menuEl.appendChild(sep);

        // Delete � deletes all selected tables if right-clicked one is among them
        var delIds = getSelectedIdsForDelete(table.id);
        var delLabel = delIds.length > 1 ? 'Delete (' + delIds.length + ')' : 'Delete';
        menuEl.appendChild(makeBtn(delLabel, SVG_DEL, true, function () {
          var ids = delIds;
          var capFiber = lastRowFiber;
          var ok = dispatchTables(capFiber, function (prev) {
            return prev.filter(function (t) { return ids.indexOf(t.id) === -1; });
          });
          if (!ok) alert('Delete failed � could not reach React state.');
          removeMenu();
        }));

        document.body.appendChild(menuEl);

        // Position � prevent overflow
        menuEl.style.left = x + 'px';
        menuEl.style.top  = y + 'px';
        var r = menuEl.getBoundingClientRect();
        if (r.right  > window.innerWidth)  menuEl.style.left = (x - r.width)  + 'px';
        if (r.bottom > window.innerHeight) menuEl.style.top  = (y - r.height) + 'px';
      }

      /* ?? Event listeners ?? */
      document.addEventListener('contextmenu', function (e) {
        var row = findTableRow(e.target);
        if (!row) { removeMenu(); return; }
        var fiber = fiberOf(row);
        if (!fiber) return;
        var table = tablePropsFromFiber(fiber);
        if (!table) return;
        e.preventDefault();
        lastRowFiber = fiber; // capture fiber at right-click time
        showMenu(e.clientX, e.clientY, table);
      });

      document.addEventListener('click', removeMenu);

      // Keyboard shortcuts � only when focus is NOT inside an input/textarea/contenteditable
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { removeMenu(); return; }

        var tag = document.activeElement && document.activeElement.tagName;
        var inInput = tag === 'INPUT' || tag === 'TEXTAREA' ||
                      (document.activeElement && document.activeElement.isContentEditable);
        if (inInput) return;

        // Ctrl+C � copy selected tables
        if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
          var active = getActiveTableRow();
          if (!active) return;
          var tocopy = getSelectedForCopy(active.table);
          try { localStorage.setItem(COPY_KEY, JSON.stringify(tocopy)); } catch (ex) {}
          showToast('Copied ' + tocopy.length + ' table' + (tocopy.length > 1 ? 's' : ''));
          e.preventDefault();
        }

        // Ctrl+V � paste after active table
        if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
          var copied = [];
          try { copied = JSON.parse(localStorage.getItem(COPY_KEY) || '[]'); } catch (ex) {}
          if (copied.length === 0) return;
          var active = getActiveTableRow();
          if (!active) return;
          var tid = active.table.id;
          dispatchTables(active.fiber, function (prev) {
            var idx = prev.findIndex(function (t) { return t.id === tid; });
            var ins = copied.map(function (t) {
              return Object.assign({}, t, { id: crypto.randomUUID(), result: null });
            });
            return idx >= 0
              ? prev.slice(0, idx + 1).concat(ins, prev.slice(idx + 1))
              : prev.concat(ins);
          });
          showToast('Pasted ' + copied.length + ' table' + (copied.length > 1 ? 's' : ''));
          e.preventDefault();
        }

        // Delete key � delete selected tables
        if (e.key === 'Delete') {
          var checked = getAllCheckedTables();
          if (checked.length === 0) return;
          var active = getActiveTableRow();
          var startFiber = (active && active.fiber) || lastRowFiber;
          if (!startFiber) return;
          var ids = checked.map(function (t) { return t.id; });
          dispatchTables(startFiber, function (prev) {
            return prev.filter(function (t) { return ids.indexOf(t.id) === -1; });
          });
          showToast('Deleted ' + ids.length + ' table' + (ids.length > 1 ? 's' : ''));
        }
      });

      // Simple toast notification
      function showToast(msg) {
        var t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2147483647;background:#1F4E78;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,0.18);pointer-events:none';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(function () { t.remove(); }, 1800);
      }

    })();
    </script>

        var needLeft = left.length > 0 && !/\s|\(|&|\||!|=|<|>$/.test(left);
        var needRight = right.length > 0 && !/^\s|\)|&|\||!|=|<|>/.test(right);
        var token = (needLeft ? ' ' : '') + varName + (needRight ? ' ' : '');
        textarea.value = left + token + right;
        var caret = left.length + token.length;
        textarea.selectionStart = textarea.selectionEnd = caret;

        _rules.forEach(function(r, idx){
          if (r.newCode==='') return;
          var expr = String(r.expression || '').trim();
          if (expr) {
            var check = validateExpression(expr);
            if (!check.ok) {
              exprErrors.push('Rule #' + (idx + 1) + ': ' + check.error);
              return;
            }
            validRules.push({ newCode: r.newCode, newLabel: r.newLabel, mode: 'expr', ast: check.ast });
            return;
          }
          if (r.conditions.length>0 && r.conditions.every(function(c){ return c.codes.length>0; })) {
            validRules.push({ newCode: r.newCode, newLabel: r.newLabel, mode: 'chip', conditions: r.conditions });
          }
        });
        if (exprErrors.length > 0) { alert('Expression Error:\\n' + exprErrors.join('\\n')); return; }
        if (validRules.length===0) { alert('�?????�?�?��??�?���?? 1 �� �??�??� expression ????????� chip �?��?�'); return; }
        var newVL={};
        validRules.forEach(function(r){ if(!(r.newCode in newVL)) newVL[r.newCode]=r.newLabel||('Code '+r.newCode); });
        var ds=_hook.data;
        var newCases=ds.cases.map(function(row){
          for (var ri=0;ri<validRules.length;ri++) {
            var rule=validRules[ri];
            var allMatch = false;
            if (rule.mode === 'expr') {
              allMatch = !!evalExprAst(rule.ast, row);
            } else {
              allMatch = rule.conditions.every(function(cond){
                var raw=row[cond.varName]; if(raw===null||raw===undefined) return false;
                return cond.codes.some(function(code){ return Number(raw)===Number(code); });
              });
            }
            if (allMatch) { var obj=Object.assign({},row); obj[varName]=Number(rule.newCode); return obj; }
          }
          var obj2=Object.assign({},row); obj2[varName]=null; return obj2;
        });
        var newVar={name:varName,longName:varName,label:varLabel||varName,isString:false,isGroupedMA:false,valueLabels:newVL,_derived:true};
        _hook.dispatch(function(prev){ if(!prev) return prev; return Object.assign({},prev,{variables:prev.variables.concat([newVar]),cases:newCases}); });
        var matched=newCases.filter(function(r){ return r[varName]!==null; }).length;
        closeModal();
        var t=document.createElement('div'); t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2147483647;background:#166534;color:#fff;padding:9px 22px;border-radius:20px;font-size:12px;font-family:inherit;box-shadow:0 4px 20px rgba(0,0,0,0.2);pointer-events:none';
        t.textContent='? ���? '+varName+' �������� � matched '+matched+'/'+newCases.length+' cases';
        document.body.appendChild(t); setTimeout(function(){ t.remove(); }, 3500);
      }

      document.addEventListener('keydown', function(e){
        if (e.key==='Escape') { if(_varCtxMenu) closeVarCtxMenu(); else if(_popover) closePopover(); else if(_modal) closeModal(); }
      });

    })();
    </script>
