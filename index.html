  <!-- Preemptive safe saveAs — MUST run before bundle so file-saver picks it up -->
  <!-- Also hide showSaveFilePicker so bundle always routes through saveAs (which we intercept for TB_Setting injection) -->
  <script>
    (function () {
      'use strict';
      function safeSaveAs(blob, filename) {
        if (window.__cxInterceptSaveAs) {
          window.__cxInterceptSaveAs(blob, filename, _doSave);
          return;
        }
        _doSave();

        function _doSave() {
          var b;
          if (blob instanceof Blob) b = blob;
          else if (blob instanceof ArrayBuffer || blob instanceof Uint8Array) b = new Blob([blob], { type: 'application/octet-stream' });
          else return;
          var url = URL.createObjectURL(b);
          var a = document.createElement('a');
          a.href = url;
          a.download = filename || 'download.xlsx';
          a.rel = 'noopener';
          a.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;pointer-events:none';
          (document.body || document.documentElement).appendChild(a);
          a.click();
          setTimeout(function () {
            try { a.parentNode && a.parentNode.removeChild(a); } catch (e) { }
            try { URL.revokeObjectURL(url); } catch (e) { }
          }, 60000);
        }
      }
      safeSaveAs.saveAs = safeSaveAs;
      window.saveAs = safeSaveAs;

      /* Globally wrap createWritable to capture the write completion on ANY file handle.
         This catches saves via both showSaveFilePicker AND showOpenFilePicker handles. */
      if (typeof FileSystemFileHandle !== 'undefined' && typeof FileSystemFileHandle.prototype.createWritable === 'function') {
        var _globalCW = FileSystemFileHandle.prototype.createWritable;
        FileSystemFileHandle.prototype.createWritable = async function () {
          /* Store the handle and the original function so the injector can use them */
          window.__cxSavedSettingsHandle = this;
          window.__cxRealCreateWritable = _globalCW.bind(this);

          var writable = await _globalCW.apply(this, arguments);

          /* Wrap close() — fires ONLY for non-injection writes */
          var _origClose = writable.close.bind(writable);
          writable.close = async function () {
            var result = await _origClose();

            /* Only trigger if it looks like a settings file, to avoid touching result exports */
            var fname = window.__cxSavedSettingsHandle.name || '';
            var isSettings = fname.toLowerCase().indexOf('setting') > -1;

            if (!window.__cxTBInjecting && isSettings) {
              console.log('[TB_Setting] file write closed (' + fname + ') — scheduling TB_Setting injection');
              setTimeout(function () {
                if (typeof window.__cxInjectTBAfterWrite === 'function') {
                  window.__cxInjectTBAfterWrite();
                }
              }, 800);
            }
            return result;
          };

          return writable;
        };
        console.log('[TB_Setting] global createWritable hook installed');
      }

      /* Serialize showSaveFilePicker — prevent "File picker already active" toast.
         A duplicate call (e.g. user double-clicks Save, or bundle retries while first
         picker is still open) is rejected silently with AbortError, which bundles
         treat as a user-cancelled pick (no error toast). */
      if (typeof window.showSaveFilePicker === 'function') {
        var _origShowSSFP = window.showSaveFilePicker;
        var _ssfpActive = false;
        window.showSaveFilePicker = function () {
          if (_ssfpActive) {
            console.warn('[CX] showSaveFilePicker suppressed — picker already active');
            return new Promise(function () { });
          }
          _ssfpActive = true;
          var p;
          try { p = _origShowSSFP.apply(this, arguments); }
          catch (e) { _ssfpActive = false; throw e; }
          return Promise.resolve(p).finally(function () { _ssfpActive = false; });
        };
      }
      if (typeof window.showOpenFilePicker === 'function') {
        var _origShowOFP = window.showOpenFilePicker;
        var _ofpActive = false;
        window.showOpenFilePicker = function () {
          if (_ofpActive) {
            console.warn('[CX] showOpenFilePicker suppressed — picker already active');
            return new Promise(function () { });
          }
          _ofpActive = true;
          var p;
          try { p = _origShowOFP.apply(this, arguments); }
          catch (e) { _ofpActive = false; throw e; }
          return Promise.resolve(p).finally(function () { _ofpActive = false; });
        };
      }
    })();
  </script>
  <!-- Script 4 — Inject TB_Setting sheet into settings xlsx on Save (both saveAs and File System Access API) -->
  <script>
    (function () {
      var _orig = window.saveAs;
      window.__cxSettingsWorkbookLinked = !!window.__cxSettingsWorkbookLinked;
      window.__cxPendingSettingsAction = window.__cxPendingSettingsAction || null;

      window.__cxRunPendingSettingsAction = function () {
        var fn = window.__cxPendingSettingsAction;
        window.__cxPendingSettingsAction = null;
        if (typeof fn !== 'function') return;
        setTimeout(function () {
          try { fn(); } catch (err) { console.error('[CX Settings] pending action failed:', err); }
        }, 160);
      };

      window.__cxMarkSettingsWorkbookLinked = function (source) {
        if (!window.__cxSettingsWorkbookLinked) {
          console.log('[CX Settings] settings workbook linked via', source || 'unknown');
        }
        window.__cxSettingsWorkbookLinked = true;
        /* After save completes via File System API, inject TB_Setting into the saved file */
        if (source === 'tables-save') {
          setTimeout(function () { _injectTBSettingPostSave(); }, 600);
        }
        window.__cxRunPendingSettingsAction();
      };

      /* ── Preset labels (short, user-friendly) ── */
      var presetLabels = {
        'tb_low_good': 'TB (1 ดี)',
        'tb_high_good': 'TB (5 ดี)',
        't2b_low_good': 'T2B (1 ดี)',
        't2b_high_good': 'T2B (5 ดี)',
        't3b_low_good': 'T3B (1 ดี)',
        't3b_high_good': 'T3B (5 ดี)',
        'justright_code': 'Justright (code)',
        'justright_centered': 'Justright (-2..2)'
      };

      /* ── Intercept File Load to Restore TB_Setting ── */
      if (typeof Blob !== 'undefined' && Blob.prototype.arrayBuffer) {
        var _origBlobAB = Blob.prototype.arrayBuffer;
        Blob.prototype.arrayBuffer = async function () {
          var buf = await _origBlobAB.apply(this, arguments);
          // Proceed only if this is a File representing an xlsx settings file
          if (this instanceof File && this.name && typeof this.name === 'string' && this.name.toLowerCase().endsWith('.xlsx')) {
            _restoreTBSettingFromBuffer(buf.slice(0), this.name);
          }
          return buf;
        };
      }

      async function _restoreTBSettingFromBuffer(buf, filename) {
        try {
          var ExcelJS = await _getExcelJS();
          if (!ExcelJS) return;
          var wb = new ExcelJS.Workbook();
          await wb.xlsx.load(buf);
          var ws = wb.worksheets.find(function (w) { return w.name === 'TB_Setting'; });
          var revLabels = {};
          Object.keys(presetLabels).forEach(function (k) { revLabels[presetLabels[k]] = k; });
          var newStore = {};
          if (ws) {
            for (var r = 2; r <= ws.rowCount; r++) {
              var vCell = ws.getCell(r, 1);
              var sCell = ws.getCell(r, 2);
              if (!vCell || !sCell) continue;
              var vName = vCell.value && vCell.value.richText ? vCell.value.richText.map(function (x) { return x.text; }).join('') : String(vCell.value || '');
              var setting = sCell.value && sCell.value.richText ? sCell.value.richText.map(function (x) { return x.text; }).join('') : String(sCell.value || '');
              if (vName && setting && vName !== 'Variable') {
                var presetId = revLabels[setting] || setting;
                newStore[vName] = { preset: presetId };
              }
            }
            console.log('[TB_Setting] Loaded from', filename, '-> mapped presets:', newStore);
          } else {
            console.log('[TB_Setting] File read from', filename, '— no TB_Setting sheet (checking Output for Sig).');
          }

          /* Extract Sig Settings from Output sheet */
          var outSheet = wb.worksheets.find(function (w) { return w.name === 'Output'; });
          var sigSettings = {};
          if (outSheet && outSheet.rowCount >= 1) {
            for (var ro = 1; ro <= outSheet.rowCount; ro++) {
              var cA = outSheet.getCell(ro, 1);
              var cB = outSheet.getCell(ro, 2);
              var kStr = cA && cA.value ? String(cA.value).trim() : '';
              var vStr = cB && cB.value ? String(cB.value).trim() : '';
              if (kStr === 'Sig Enabled') sigSettings.enabled = (vStr.toLowerCase() === 'true' || vStr === '1' || vStr.toLowerCase() === 'yes');
              if (kStr === 'Sig Level') sigSettings.level = Number(vStr) || 95;
              if (kStr === 'Sig Letters') sigSettings.sigLetters = vStr;
            }
          }

          /* The app resets state shortly after reading the file. We wait 800ms then apply our presets. */
          setTimeout(function () {
            /* Mark as linked after successful settings load so Variable Editor won't reprompt save */
            if (!window.__cxSettingsWorkbookLinked) {
              window.__cxSettingsWorkbookLinked = true;
              if (typeof window.__cxRunPendingSettingsAction === 'function') {
                try { window.__cxRunPendingSettingsAction(); } catch (e) { }
              }
            }
            if (Object.keys(sigSettings).length > 0 && typeof window.__cxSaveSigSettings === 'function') {
              var currSig = window.__cxLoadSigSettings ? window.__cxLoadSigSettings() : {};
              var nextSig = Object.assign({}, currSig, sigSettings);
              window.__cxSaveSigSettings(nextSig);
              console.log('[TB_Setting] ✅ Restored Sig Settings from Output sheet!', nextSig);
            }

            var currentStore = (typeof window.__cxGetTbPresetStore === 'function') ? window.__cxGetTbPresetStore() : {};
            /* If TB_Setting exists in file, trust it as source-of-truth and drop old presets.
               If no TB_Setting, keep current in-memory store. */
            var merged = ws ? Object.assign({}, newStore) : Object.assign({}, currentStore);
            if (typeof window.__cxSetTbPresetStore === 'function') {
              window.__cxSetTbPresetStore(merged);
              if (typeof cxSyncPresetHintsFromStore === 'function') {
                try { cxSyncPresetHintsFromStore(merged); } catch (_eh) { }
              }
              console.log('[TB_Setting] ✅ Restored T2B presets back to app state!');
            }
          }, 800);
        } catch (e) { console.error('[TB_Setting] restore error:', e); }
      }

      /* ── Styling helpers ── */
      function _styleHeader(cell) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F4E78' } };
        cell.font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 11, name: 'Calibri' };
        cell.alignment = { horizontal: 'center', vertical: 'middle' };
        cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
      }
      function _styleData(cell, even) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: even ? 'FFEBF3FB' : 'FFFFFFFF' } };
        cell.font = { size: 10, name: 'Calibri' };
        cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
      }

      /* ── Get ExcelJS (dynamic-import bundle chunk, then cache on window) ── */
      async function _getExcelJS() {
        if (window.__cxExcelJSModule && window.__cxExcelJSModule.Workbook) return window.__cxExcelJSModule;
        /* Primary: dynamically import the exceljs chunk shipped with the bundle */
        try {
          var mod = await import('/assets/exceljs.min-D_N-FMmF.js');
          var EJS = (mod && mod.e && mod.e.default) ? mod.e.default : null;
          if (EJS && EJS.Workbook) {
            window.__cxExcelJSModule = EJS;
            return EJS;
          }
        } catch (err) {
          console.warn('[TB_Setting] dynamic exceljs import failed:', err);
        }
        /* Fallback: wait briefly in case something else populates the cache */
        for (var i = 0; i < 20; i++) {
          await new Promise(function (r) { setTimeout(r, 100); });
          if (window.__cxExcelJSModule && window.__cxExcelJSModule.Workbook) return window.__cxExcelJSModule;
        }
        console.warn('[TB_Setting] ExcelJS not available from cache');
        return null;
      }

      /* ── Read overrides from _settings JSON in workbook ── */
      function _readOverrides(wb) {
        var wsH = wb.worksheets.find(function (w) { return w.name === '_settings'; });
        if (!wsH) return null;
        var chunks = [];
        for (var i = 1; i <= wsH.rowCount; i++) {
          var v = wsH.getCell(i, 1).value;
          if (!v) break;
          chunks.push(String(v));
        }
        var json = chunks.join('');
        if (!json.startsWith('{')) return null;
        try { return JSON.parse(json); } catch (e) { return null; }
      }

      /* ── Inject/Append TB_Setting sheet into workbook and clean VariableSettings ── */
      function _injectTBSettingSheet(wb) {
        /* Read preset data from LIVE app state because export JSON drops summaryPreset */
        var tbPresets = {};
        if (typeof window.__cxGetTbPresetStore === 'function') {
          try { tbPresets = window.__cxGetTbPresetStore() || {}; } catch (e) { }
        }
        var presetKeys = Object.keys(tbPresets).filter(function (k) {
          return tbPresets[k] && tbPresets[k].preset;
        });

        /* Filter out presets for variables that aren't in the CURRENT dataset
           (leftover from a previous job). Compare case-insensitively against both
           `name` and `longName`. If no dataset is loaded, keep all (safety). */
        try {
          var ds = (typeof resolveLiveDataset === 'function') ? resolveLiveDataset() : null;
          if (ds && Array.isArray(ds.variables) && ds.variables.length) {
            var validNames = Object.create(null);
            ds.variables.forEach(function (v) {
              if (v && v.name) validNames[String(v.name).toLowerCase()] = true;
              if (v && v.longName) validNames[String(v.longName).toLowerCase()] = true;
            });
            presetKeys = presetKeys.filter(function (k) {
              return validNames[String(k).toLowerCase()];
            });
          }
        } catch (_dsErr) { /* keep original list on lookup error */ }

        var newEntries = presetKeys
          .sort(function (a, b) { return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }); })
          .map(function (k) {
            var preset = tbPresets[k].preset;
            var label = presetLabels[preset] || preset;
            return { variable: k, setting: label };
          });

        /* 1. Find or create TB_Setting sheet */
        var ws = wb.worksheets.find(function (w) { return w.name === 'TB_Setting'; });
        if (newEntries.length > 0) {
          var existingVars = {};
          var startRow = 2; /* row after header */

          if (ws) {
            for (var r = 2; r <= ws.rowCount; r++) {
              var varName = ws.getCell(r, 1).value;
              if (varName) {
                existingVars[String(varName).trim()] = r;
              }
            }
            startRow = ws.rowCount + 1;
          } else {
            ws = wb.addWorksheet('TB_Setting');
            ws.getColumn(1).width = 24;
            ws.getColumn(2).width = 34;
            var hRow = ws.addRow(['Variable', 'Setting']);
            hRow.height = 18;
            hRow.eachCell(_styleHeader);
            startRow = 2;
          }

          var rowIdx = startRow;
          newEntries.forEach(function (entry) {
            if (existingVars[entry.variable]) {
              var existRow = existingVars[entry.variable];
              ws.getCell(existRow, 2).value = entry.setting;
              var even = (existRow - 2) % 2 === 1;
              ws.getCell(existRow, 1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: even ? 'FFEBF3FB' : 'FFFFFFFF' } };
              ws.getCell(existRow, 2).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: even ? 'FFEBF3FB' : 'FFFFFFFF' } };
            } else {
              var dRow = ws.addRow([entry.variable, entry.setting]);
              dRow.height = 16;
              var even = (rowIdx - 2) % 2 === 1;
              dRow.eachCell(function (cell) { _styleData(cell, even); });
              rowIdx++;
            }
          });
          console.log('[TB_Setting] sheet updated: ' + newEntries.length + ' entries processed');
        }

        /* 2. Clean VariableSettings: completely remove variables having T2B to ensure clean settings workbook */
        var vsSheet = wb.worksheets.find(function (w) { return w.name === 'VariableSettings'; });
        if (vsSheet && presetKeys.length > 0) {
          var toDelete = [];
          for (var ri = 1; ri <= vsSheet.rowCount; ri++) {
            var varCell = vsSheet.getCell(ri, 1); /* Column A = Variable */
            var vStr = "";
            if (varCell && varCell.value) {
              if (varCell.value.richText) vStr = varCell.value.richText.map(function (x) { return x.text; }).join('');
              else if (varCell.value.text) vStr = varCell.value.text;
              else vStr = String(varCell.value);
            }
            if (vStr && presetKeys.indexOf(vStr.trim()) > -1) {
              toDelete.push(ri);
            }
          }
          for (var di = toDelete.length - 1; di >= 0; di--) {
            vsSheet.spliceRows(toDelete[di], 1);
          }
          if (toDelete.length > 0) {
            console.log('[TB_Setting] wiped ' + toDelete.length + ' rows for T2B vars from VariableSettings');
          }
        }

        /* 3. Sync Sig Settings to Output sheet */
        var outSheet = wb.worksheets.find(function (w) { return w.name === 'Output'; });
        if (outSheet) {
          var sigSet = window.__cxGlobalSettingsState && window.__cxGlobalSettingsState.sigSettings || {};
          var sigKeys = { 'Sig Enabled': sigSet.enabled ? 'Yes' : 'No', 'Sig Level': sigSet.level || 95, 'Sig Letters': sigSet.sigLetters || '' };
          var existingRows = {};
          for (var ri = 1; ri <= outSheet.rowCount; ri++) {
            var cA = outSheet.getCell(ri, 1);
            if (cA && cA.value) existingRows[String(cA.value).trim()] = ri;
          }

          /* Find a template row (e.g., "showCount" at row 2) to copy style from */
          var templateRow = null;
          for (var tr = 2; tr <= outSheet.rowCount; tr++) {
            var tvA = outSheet.getCell(tr, 1).value;
            var tvB = outSheet.getCell(tr, 2).value;
            if (tvA && tvB != null) { templateRow = tr; break; }
          }
          function _copyCellStyle(fromCell, toCell) {
            if (!fromCell) return;
            if (fromCell.fill) toCell.fill = JSON.parse(JSON.stringify(fromCell.fill));
            if (fromCell.font) toCell.font = JSON.parse(JSON.stringify(fromCell.font));
            if (fromCell.alignment) toCell.alignment = JSON.parse(JSON.stringify(fromCell.alignment));
            if (fromCell.border) toCell.border = JSON.parse(JSON.stringify(fromCell.border));
            if (fromCell.numFmt) toCell.numFmt = fromCell.numFmt;
          }

          Object.keys(sigKeys).forEach(function (k) {
            var rowIdx = existingRows[k];
            var isNew = !rowIdx;
            if (isNew) {
              rowIdx = outSheet.rowCount + 1;
              outSheet.getCell(rowIdx, 1).value = k;
            }
            var valueCell = outSheet.getCell(rowIdx, 2);
            valueCell.value = sigKeys[k];
            /* Apply template styling to newly-added rows so they match existing ones */
            if (isNew && templateRow) {
              _copyCellStyle(outSheet.getCell(templateRow, 1), outSheet.getCell(rowIdx, 1));
              _copyCellStyle(outSheet.getCell(templateRow, 2), valueCell);
            }
            /* Add dropdown data validation for Sig Enabled (Yes/No) and Sig Level (90/95/99) */
            if (k === 'Sig Enabled') {
              valueCell.dataValidation = {
                type: 'list', allowBlank: false, showErrorMessage: true,
                formulae: ['"Yes,No"'],
                errorStyle: 'error', errorTitle: 'Invalid value', error: 'Please select Yes or No'
              };
            } else if (k === 'Sig Level') {
              valueCell.dataValidation = {
                type: 'list', allowBlank: false, showErrorMessage: true,
                formulae: ['"90,95,99"'],
                errorStyle: 'error', errorTitle: 'Invalid value', error: 'Please select 90, 95, or 99'
              };
            }
          });
        }
      }

      /* ═══ Path 1: Intercept saveAs (fallback browsers) ═══
         Only inject TB_Setting into the SETTINGS workbook, not table-export files.
         Heuristic: filename contains 'settings' (case-insensitive) → settings file.
         Table exports (crosstab_all.xlsx, crosstab_selected.xlsx, user table names) skip. */
      function _isSettingsFilename(filename) {
        if (typeof filename !== 'string') return false;
        return /settings/i.test(filename);
      }
      window.__cxInterceptSaveAs = function (blob, filename, originalAction) {
        console.log('[TB_Setting] interceptedSaveAs called:', filename);
        if (typeof filename === 'string' && /\.xlsx$/i.test(filename)) {
          if (_isSettingsFilename(filename)) {
            _processBlob(blob, filename, originalAction).catch(function (err) {
              console.error('[TB_Setting] inject failed:', err);
              originalAction();
            });
            return;
          }
          /* Table-export files: resize all data columns to uniform narrow width */
          _resizeTableExportColumns(blob, filename, originalAction).catch(function (err) {
            console.error('[TB_Setting] table resize failed:', err);
            originalAction();
          });
          return;
        }
        originalAction();
      };

      /* Resize all data columns to a uniform narrow width in exported crosstab files.
         Row-label columns (A, B) stay readable; every column from C onward is 7 chars.
         Skips the Index/TOC sheet (detected by having 'Index' name). */
      async function _resizeTableExportColumns(blob, filename, originalAction) {
        var ExcelJS = await _getExcelJS();
        if (!ExcelJS) { originalAction(); return; }
        var buf = await blob.arrayBuffer();
        var wb = new ExcelJS.Workbook();
        await wb.xlsx.load(buf);
        wb.worksheets.forEach(function (ws) {
          if (!ws || !ws.columns || ws.name === 'Index') return;
          try {
            var last = ws.columnCount || ws.actualColumnCount || ws.columns.length;
            for (var c = 1; c <= last; c++) {
              var col = ws.getColumn(c);
              if (c === 1) col.width = 16;          /* row group label */
              else if (c === 2) col.width = 14;     /* row leaf label */
              else col.width = 5.5;                 /* uniform narrow data column */
            }
          } catch (_rcErr) { /* non-fatal */ }
        });
        var newBuf = await wb.xlsx.writeBuffer();
        var newBlob = new Blob([newBuf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        var _tempSave = window.__cxInterceptSaveAs;
        window.__cxInterceptSaveAs = null;
        window.saveAs(newBlob, filename);
        window.__cxInterceptSaveAs = _tempSave;
      }

      async function _processBlob(blob, filename, originalAction) {
        var ExcelJS = await _getExcelJS();
        if (!ExcelJS) { originalAction(); return; }

        var buf = await blob.arrayBuffer();
        var wb = new ExcelJS.Workbook();
        await wb.xlsx.load(buf);

        _injectTBSettingSheet(wb);

        /* Inject Sig letters if Sig is enabled (unified pipeline) */
        try {
          var sigSet = (typeof window.__cxLoadSigSettings === 'function') ? window.__cxLoadSigSettings() : null;
          if (sigSet && sigSet.enabled && typeof window.__cxInjectSigIntoWorkbook === 'function') {
            window.__cxInjectSigIntoWorkbook(wb, sigSet);
          }
        } catch (sigErr) {
          console.error('[Sig] inject via TB_Setting pipeline failed:', sigErr);
        }

        var newBuf = await wb.xlsx.writeBuffer();
        var newBlob = new Blob([newBuf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

        // Pass the modified blob to the original safeSaveAs logic
        var _tempSave = window.__cxInterceptSaveAs;
        window.__cxInterceptSaveAs = null; // disable intercept temporarily
        window.saveAs(newBlob, filename);
        window.__cxInterceptSaveAs = _tempSave;

        if (typeof window.__cxMarkSettingsWorkbookLinked === 'function') {
          window.__cxMarkSettingsWorkbookLinked('saveAs');
        }
      }

      /* ═══ Path 2: Post-save injection via File System API ═══ */

          if (!cls.includes('bg-blue-50')) return;
          var f = fiberOf(row);
          if (!f) return;
          var t = tablePropsFromFiber(f);
          if (t) result.push(t);
        });
        return result;
      }

      // Returns active table (dark blue border) fiber and data, for paste anchor.
      function getActiveTableRow() {
        var allRows = document.querySelectorAll('[draggable="true"]');
        for (var i = 0; i < allRows.length; i++) {
          var row = allRows[i];
          var cls = typeof row.className === 'string' ? row.className : '';
          if (cls.includes('border-[#1F4E78]') && cls.includes('border-l-2')) {
            var f = fiberOf(row);
            var t = f ? tablePropsFromFiber(f) : null;
            if (t) return { fiber: f, table: t };
          }
        }
        return null;
      }

      // Collect tables to copy: all selected rows if right-clicked table is among them.
      function getSelectedForCopy(rightClickedTable) {
        var checked = getAllCheckedTables();
        var inSel = checked.some(function (t) { return t.id === rightClickedTable.id; });
        return (inSel && checked.length > 1) ? checked : [rightClickedTable];
      }

      // Collect IDs to delete: all selected if right-clicked table is among them.
      function getSelectedIdsForDelete(rightClickedId) {
        var checked = getAllCheckedTables();
        var inSel = checked.some(function (t) { return t.id === rightClickedId; });
        return (inSel && checked.length > 1)
          ? checked.map(function (t) { return t.id; })
          : [rightClickedId];
      }

      /* โ”€โ”€ Context menu โ”€โ”€ */
      function removeMenu() {
        if (menuEl) { menuEl.remove(); menuEl = null; }
      }

      var SVG_COPY = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      var SVG_PASTE = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>';
      var SVG_DEL = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>';

      function makeBtn(label, svgIcon, danger, onClick) {
        var b = document.createElement('button');
        b.style.cssText = [
          'display:flex', 'align-items:center', 'gap:8px', 'width:100%',
          'padding:7px 12px', 'border:none', 'background:none', 'cursor:pointer',
          'font-size:12px', 'font-family:inherit', 'text-align:left',
          'color:' + (danger ? '#dc2626' : '#374151')
        ].join(';');
        b.innerHTML = svgIcon + '<span>' + label + '</span>';
        b.addEventListener('mouseover', function () { b.style.background = danger ? '#fef2f2' : '#f9fafb'; });
        b.addEventListener('mouseout', function () { b.style.background = ''; });
        b.addEventListener('click', function (e) { e.stopPropagation(); onClick(); });
        return b;
      }

      function showMenu(x, y, table) {
        removeMenu();

        var selectedForCopy = getSelectedForCopy(table);
        var copied = getClipboardTables();

        menuEl = document.createElement('div');
        menuEl.style.cssText = [
          'position:fixed', 'z-index:2147483647',
          'background:#fff', 'border:1px solid #e5e7eb',
          'border-radius:12px', 'padding:4px 0',
          'box-shadow:0 8px 24px rgba(0,0,0,0.13)',
          'min-width:164px', 'font-family:inherit'
        ].join(';');

        // Copy โ€” copies all selected tables if right-clicked table is in the selection
        menuEl.appendChild(makeBtn('Copy' + (selectedForCopy.length > 1 ? ' (' + selectedForCopy.length + ')' : ''), SVG_COPY, false, function () {
          setClipboardTables(selectedForCopy);
          removeMenu();
        }));

        // Paste (only shown when buffer has data)
        if (copied.length > 0) {
          menuEl.appendChild(makeBtn('Paste (' + copied.length + ')', SVG_PASTE, false, function () {
            var tid = table.id;
            var capFiber = lastRowFiber;
            var ok = dispatchTables(capFiber, function (prev) {
              var idx = prev.findIndex(function (t) { return t.id === tid; });
              var ins = copied.map(function (t) {
                return Object.assign({}, t, { id: crypto.randomUUID(), result: null });
              });
              return idx >= 0
                ? prev.slice(0, idx + 1).concat(ins, prev.slice(idx + 1))
                : prev.concat(ins);

            removeMenu();
          }));
        }

        // Separator
        var sep = document.createElement('div');
        sep.style.cssText = 'height:1px;background:#f3f4f6;margin:4px 0';
        menuEl.appendChild(sep);

        // Delete โ€” deletes all selected tables if right-clicked one is among them
        var delIds = getSelectedIdsForDelete(table.id);
        var delLabel = delIds.length > 1 ? 'Delete (' + delIds.length + ')' : 'Delete';
        menuEl.appendChild(makeBtn(delLabel, SVG_DEL, true, function () {
          var ids = delIds;
          var capFiber = lastRowFiber;
          var ok = dispatchTables(capFiber, function (prev) {
            return prev.filter(function (t) { return ids.indexOf(t.id) === -1; });
          });
          if (!ok) alert('Delete failed โ€” could not reach React state.');
          removeMenu();
        }));

      document.addEventListener('contextmenu', function (e) {

        if (!fiber) return;

      // Keyboard shortcuts โ€” only when focus is NOT inside an input/textarea/contenteditable

          showToast('Copied ' + tocopy.length + ' table' + (tocopy.length > 1 ? 's' : ''));
          e.preventDefault();
        }

        // Ctrl+V โ€” paste after active table
        if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
          var copied = getClipboardTables();
          if (copied.length === 0) return;
          var active = getActiveTableRow();
          if (!active) return;
          var tid = active.table.id;
          dispatchTables(active.fiber, function (prev) {
            var idx = prev.findIndex(function (t) { return t.id === tid; });
            var ins = copied.map(function (t) {
              return Object.assign({}, t, { id: crypto.randomUUID(), result: null });
            });
            return idx >= 0
              ? prev.slice(0, idx + 1).concat(ins, prev.slice(idx + 1))
              : prev.concat(ins);
          });
          showToast('Pasted ' + copied.length + ' table' + (copied.length > 1 ? 's' : ''));
          e.preventDefault();
        }

        // Delete key โ€” delete selected tables
        if (e.key === 'Delete') {
          var checked = getAllCheckedTables();
          if (checked.length === 0) return;
          var active = getActiveTableRow();
          var startFiber = (active && active.fiber) || lastRowFiber;
          if (!startFiber) return;
          var ids = checked.map(function (t) { return t.id; });
          dispatchTables(startFiber, function (prev) {
            return prev.filter(function (t) { return ids.indexOf(t.id) === -1; });
          });
          showToast('Deleted ' + ids.length + ' table' + (ids.length > 1 ? 's' : ''));
        }
      });

      // Simple toast notification
      function showToast(msg) {
        var t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2147483647;background:#1F4E78;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,0.18);pointer-events:none';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(function () { t.remove(); }, 1800);
      }

    })();
  </script>

  <!-- Variable Folders right-click context menu โ€” replaces per-variable action buttons -->

        '.min-h-\\[84px\\].flex-nowrap { gap: 0 !important; }',
        '.min-h-\\[84px\\] > * { margin: 0 !important; }',
        '.min-h-\\[84px\\] > * > div:first-child:not(.min-w-\\[86px\\]):not(.min-h-\\[42px\\]) { display: none !important; }'
      ].join('\n');
      document.head.appendChild(styleEl);

      /* JS failsafe — flatten Top axis chip spacing at runtime */
      var _cxTightenTimer = null;
      function cxTightenTopChips() {
        try {
          var containers = document.querySelectorAll('[class*="min-h-[84px]"]');
          for (var i = 0; i < containers.length; i++) {
            var c = containers[i];
            c.style.gap = '0';
            c.style.columnGap = '0';
            var kids = c.children;
            for (var j = 0; j < kids.length; j++) {
              var k = kids[j];
              k.style.margin = '0';
              /* Check if first grandchild is a thin spacer (< 20px wide) → hide */
              if (k.children && k.children[0]) {
                var gc = k.children[0];
                var cls = String(gc.className || '');
                /* Heuristic: drop zones have "rounded" but no chip-like sizing */
                if (cls.indexOf('min-w-[10px]') >= 0 || cls.indexOf(' w-2 ') >= 0 || /\bw-2\b/.test(cls)) {
                  gc.style.display = 'none';
                }
              }
            }
          }
        } catch (e) { }
      }
      function cxTightenDebounced() {
        if (_cxTightenTimer) return;
        _cxTightenTimer = setTimeout(function () {
          _cxTightenTimer = null;
          cxTightenTopChips();
        }, 150);
      }
      try {
        new MutationObserver(cxTightenDebounced).observe(document.body, { childList: true, subtree: true });
      } catch (e) { }
      setTimeout(cxTightenTopChips, 800);

      var varMenuEl = null;

      /* โ”€โ”€ Fiber helpers โ”€โ”€ */
      function fiberOf2(el) {
        var k = Object.keys(el).find(function (k) { return k.startsWith('__reactFiber'); });
        return k ? el[k] : null;
      }

      function varInfoFromFiber(fiber) {
        var f = fiber;
        for (var i = 0; i < 12 && f; i++) {
          var p = f.memoizedProps;
          if (p && p.v && typeof p.v.name === 'string' && typeof p.onQuickAction === 'function') {
            return {
              varName: p.v.name,
              onQuickAction: p.onQuickAction,
              activeTarget: p.activeTarget || 'side'
            };
          }
          f = f.return;
        }
        return null;
      }

      /* โ”€โ”€ DOM helpers โ”€โ”€ */
      function findVarRow(el) {
        var e = el;
        while (e && e !== document.body) {

      // เธเธทเธ list เธ•เธฑเธงเนเธเธฃเธ—เธตเนเธเธฐ apply action: เธ–เนเธฒ right-click เธเธ selected โ’ เธ—เธฑเนเธเธซเธกเธ”เธ—เธตเนเน€เธฅเธทเธญเธ, เนเธกเนเนเธเน โ’ เนเธเนเธ•เธฑเธงเธเธฑเนเธ
      function getTargetVarNames(rightClickedVarName) {
        var selected = [];
        var allRows = document.querySelectorAll('[draggable="true"]');
        allRows.forEach(function (row) {
          var cls = typeof row.className === 'string' ? row.className : '';
          // ring-blue-100 เธกเธตเน€เธเธเธฒเธฐเธ•เธญเธ selected = true เน€เธ—เนเธฒเธเธฑเนเธ (เนเธกเนเธกเธต hover variant)
          if (!cls.includes('cursor-grab') || !cls.includes('ring-blue-100')) return;
          var f = fiberOf2(row);
          if (!f) return;
          var info = varInfoFromFiber(f);
          if (info) selected.push(info.varName);
        });
        var inSel = selected.indexOf(rightClickedVarName) !== -1;

      function removeVarMenu() {

      }

      var SVG_TOP = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';

      var SVG_TABLE = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>';

      function makeVarBtn(label, svgIcon, color, isBold, onClick) {
        var b = document.createElement('button');
        b.style.cssText = [
          'display:flex', 'align-items:center', 'gap:8px', 'width:100%',

        hdr.textContent = multi ? targets.length + ' variables selected' : varName;
        varMenuEl.appendChild(hdr);

          { label: 'Add to Side', key: 'side', icon: SVG_SIDE, color: '#1d4ed8' },

          // เนเธ•เนเน€เธเธทเนเธญเนเธซเนเธเธฃเธญเธเธเธฅเธธเธกเธ—เธธเธเธเธฃเธ“เธตเน€เธฃเธตเธขเธเธ”เนเธงเธข varName เธ•เธฑเธงเนเธฃเธ (bundle เธเธฐเธญเนเธฒเธ selectedVariableNames เน€เธญเธ)

      document.addEventListener('contextmenu', function (e) {

        var fiber = fiberOf2(row);
        if (!fiber) return;
        var info = varInfoFromFiber(fiber);
        if (!info) return;
        e.preventDefault();

      document.addEventListener('click', removeVarMenu);

    })();

  <!-- Multi-variable drag-and-drop: drop multiple selected variables to Top/Side at once -->
  <script>
    (function () {

      function fiberOfMD(el) {

        return k ? el[k] : null;
      }

      function varInfoMD(fiber) {
        var f = fiber;
        for (var i = 0; i < 12 && f; i++) {
          var p = f.memoizedProps;
          if (p && p.v && typeof p.v.name === 'string' && typeof p.onQuickAction === 'function') {
            return { varName: p.v.name, onQuickAction: p.onQuickAction };
          }
          f = f.return;
        }

      function findVarRowMD(el) {
        var e = el;

          if (e.draggable && typeof e.className === 'string' && e.className.includes('cursor-grab')) return e;
          e = e.parentElement;
        }

        if (!cls || typeof cls !== 'string') return false;

        var allRows = document.querySelectorAll('[draggable="true"]');

          var f = fiberOfMD(row);
          if (!f) return;
          var info = varInfoMD(f);
          if (info) selected.push(info.varName);
        });
        return selected;
      }

        var rows = document.querySelectorAll('[draggable="true"]');
        for (var i = 0; i < rows.length; i++) {
          var row = rows[i];

          var f = fiberOfMD(row);

      function insertVarToken(textarea, varName) {
        var start = textarea.selectionStart || 0;

        var right = textarea.value.slice(end);
        var needLeft = left.length > 0 && !/\s|\(|&|\||!|=|<|>$/.test(left);
        var needRight = right.length > 0 && !/^\s|\)|&|\||!|=|<|>/.test(right);
        var token = (needLeft ? ' ' : '') + varName + (needRight ? ' ' : '');

      function tokenizeExpr(input) {
        var src = String(input || '');
        var i = 0;
        var out = [];
        while (i < src.length) {
          var c = src[i];
          if (/\s/.test(c)) { i++; continue; }
          if (c === '(' || c === ')') { out.push({ t: c, v: c, p: i++ }); continue; }
          if (c === '&' || c === '|') { out.push({ t: 'L', v: src[i + 1] === c ? (i++, c + c) : c, p: i++ }); continue; }
          if (c === '!') { out.push({ t: src[i + 1] === '=' ? 'O' : 'N', v: src[i + 1] === '=' ? (i++, '!=') : '!', p: i++ }); continue; }
          if (c === '<' || c === '>') {
            if (src[i + 1] === '=') { out.push({ t: 'O', v: c + '=', p: i }); i += 2; continue; }
            if (c === '<' && src[i + 1] === '>') { out.push({ t: 'O', v: '!=', p: i }); i += 2; continue; }
            out.push({ t: 'O', v: c, p: i++ }); continue;
          }
          if (c === '=') { out.push({ t: 'O', v: src[i + 1] === '=' ? (i++, '==') : '=', p: i++ }); continue; }
          if (c === '"' || c === "'") {
            var q = c; var p = i++; var str = '';
            while (i < src.length && src[i] !== q) str += src[i++];
            if (i >= src.length) throw new Error('Unclosed string at ' + p);
            i++;
            out.push({ t: 'S', v: str, p: p });
            continue;
          }
          if (/[0-9.]/.test(c)) {
            var ns = i;
            while (i < src.length && /[0-9.]/.test(src[i])) i++;
            var raw = src.slice(ns, i);
            if (!/^\d+(\.\d+)?$/.test(raw)) throw new Error('Invalid number "' + raw + '" at ' + ns);
            out.push({ t: 'M', v: Number(raw), p: ns });
            continue;
          }
          if (/[A-Za-z_$]/.test(c)) {
            var ws = i;
            while (i < src.length && /[A-Za-z0-9_$]/.test(src[i])) i++;
            var w = src.slice(ws, i);
            var u = w.toUpperCase();
            if (u === 'AND' || u === 'OR') out.push({ t: 'L', v: u, p: ws });
            else if (u === 'NOT') out.push({ t: 'N', v: 'NOT', p: ws });
            else out.push({ t: 'I', v: w, p: ws });
            continue;
          }
          throw new Error('Unexpected "' + c + '" at ' + i);
        }
        out.push({ t: 'E', v: '', p: src.length });
        return out;
      }

      function parseExpr(tokens) {
        var p = 0;
        var used = new Set();
        function cur() { return tokens[p]; }
        function eat(t) { return cur().t === t ? tokens[p++] : null; }
        function req(t, m) { if (!eat(t)) throw new Error(m + ' at ' + cur().p); }
        function primary() {
          var t = cur();
          if (eat('(')) { var e = orExpr(); req(')', 'Expected )'); return e; }
          if (eat('M')) return { k: 'lit', v: t.v };
          if (eat('S')) return { k: 'lit', v: t.v };
          if (eat('I')) { used.add(t.v); return { k: 'var', n: t.v }; }
          throw new Error('Expected value at ' + t.p);
        }
        function cmpExpr() {
          var l = primary();
          var o = cur().t === 'O' ? tokens[p++] : null;
          if (!o) return l;
          return { k: 'cmp', o: o.v, l: l, r: primary() };
        }
        function unary() { return eat('N') ? { k: 'not', e: unary() } : cmpExpr(); }
        function andExpr() { var n = unary(); while (cur().t === 'L' && (cur().v === '&' || cur().v === '&&' || cur().v === 'AND')) { p++; n = { k: 'and', l: n, r: unary() }; } return n; }
        function orExpr() { var n = andExpr(); while (cur().t === 'L' && (cur().v === '|' || cur().v === '||' || cur().v === 'OR')) { p++; n = { k: 'or', l: n, r: andExpr() }; } return n; }
        var ast = orExpr();
        if (cur().t !== 'E') throw new Error('Unexpected token at ' + cur().p);
        return { ast: ast, used: Array.from(used) };
      }

      function toNum(v) { var n = Number(v); return Number.isFinite(n) ? n : NaN; }
      function cmpVals(a, b, op) {
        var an = toNum(a), bn = toNum(b), both = Number.isFinite(an) && Number.isFinite(bn);
        if (op === '=' || op === '==') return both ? an === bn : String(a) === String(b);
        if (op === '!=') return both ? an !== bn : String(a) !== String(b);
        if (!both) return false;
        if (op === '>') return an > bn;
        if (op === '>=') return an >= bn;
        if (op === '<') return an < bn;
        if (op === '<=') return an <= bn;
        return false;
      }

      function evalExprAst(node, row) {
        if (!node) return false;
        if (node.k === 'lit') return node.v;
        if (node.k === 'var') return row[node.n];
        if (node.k === 'cmp') return cmpVals(evalExprAst(node.l, row), evalExprAst(node.r, row), node.o);
        if (node.k === 'not') return !Boolean(evalExprAst(node.e, row));
        if (node.k === 'and') return Boolean(evalExprAst(node.l, row)) && Boolean(evalExprAst(node.r, row));
        if (node.k === 'or') return Boolean(evalExprAst(node.l, row)) || Boolean(evalExprAst(node.r, row));
        return false;
      }

          return { ok: true, ast: normalizeExprAst(parsed.ast), used: parsed.used };
        } catch (err) {

        }
      }

  <!-- Script 5 — Test Sig: Significance Testing for Crosstab columns -->
  <script>

      }

      /* ── Z critical values ── */
      function zCrit(level) {
        return level === 90 ? 1.6449 : 1.96;
      }

      /* ── Column proportion z-test ── */
      function computeSigLetters(counts, colBases, sigLevel, letterMap) {
        var nRows = counts.length;
        var nCols = colBases.length;
        var zc = zCrit(sigLevel);
        var result = [];
        for (var ri = 0; ri < nRows; ri++) {
          var row = [];
          for (var ci = 0; ci < nCols; ci++) row.push([]);
          result.push(row);
        }
        for (var ri = 0; ri < nRows; ri++) {
          for (var ci = 0; ci < nCols; ci++) {
            var ni = colBases[ci];
            if (ni < 2) continue;
            var countI = (counts[ri] && counts[ri][ci]) || 0;
            var pi = countI / ni;
            for (var cj = 0; cj < nCols; cj++) {
              if (ci === cj) continue;

              if (nj < 2) continue;
              var countJ = (counts[ri] && counts[ri][cj]) || 0;
              var pPooled = (countI + countJ) / (ni + nj);
              if (pPooled <= 0 || pPooled >= 1) continue;
              var se = Math.sqrt(pPooled * (1 - pPooled) * (1 / ni + 1 / nj));
              if (se <= 0) continue;
              var z = (pi - countJ / nj) / se;

      function addSigHeaderLetters(table, nCols, letterMap) {

         ══════════════════════════════════════════════════════════ */

      var SKIP_SHEETS = {

      function cellNum(cell) {
        var v = cell.value;

      function injectSigIntoWorkbook(wb, sigSettings) {

        wb.eachSheet(function (ws) {

          /* ── 1. Detect structure: find the "N" / "%" header row ── */
          var nRow = 0; /* row number of the N/% header */
          var labelCols = 0; /* how many label columns on the left */
          var step = 1; /* 1 = count-only or %-only, 2 = N+% side by side */
          var isCountMode = true;

          for (var r = 1; r <= Math.min(ws.rowCount, 15); r++) {

            /* The N/% row has "N" or "%" in data columns */

            if (c1 === '') {

                var cv = String(ws.getCell(r, cc).value || '').trim();
                if (cv === 'N' || cv === '%') {

                  labelCols = cc - 1;
                  /* step=2 only when N+% side by side (cv='N', next='%') */
                  var nxt = String(ws.getCell(r, cc + 1).value || '').trim();
                  if (cv === 'N' && nxt === '%') step = 2;
                  if (cv === '%') isCountMode = false;

          /* First data col = Total N (or %), then column data */

          if (!letterMap) return; /* user must provide sig letters first */

          /* ── 3. Add sig letter labels to the column sub-header row ── */
          /* The sub-header with column names is typically at nRow - 1 */

              /* Append letter: "BKK" → "BKK\n(A)" */
              cell.value = {
                richText: [
                  { text: label, font: { bold: true, size: 11, name: 'Calibri', color: { argb: 'FFFFFFFF' } } },
                  { text: '\n(' + letterMap[ci] + ')', font: { bold: true, size: 10, name: 'Calibri', color: { argb: 'FFFBBF24' } } }
                ]

            }

          /* ── 4. Scan rows: find Base rows and data rows ── */
          var sections = []; /* { baseRow, baseCols[], startRow, endRow } */
          var dataRows = []; /* row numbers of data rows (not base/stat/summary) */

          for (var r = nRow + 1; r <= ws.rowCount; r++) {
            /* Check if this row is a Base row */
            var isBase = false;
            for (var lc = 1; lc <= labelCols + 1; lc++) {
              var lv = String(ws.getCell(r, lc).value || '').trim();
              if (lv === 'Base') { isBase = true; break; }
            }

              var baseCols = [];

              sections.push({ baseRow: r, baseCols: baseCols, dataRows: [] });
            } else if (sections.length > 0) {
              /* Check if it's a "Cell Contents:" footer line → stop */
              var fc = String(ws.getCell(r, 1).value || '').trim();
              if (fc === 'Cell Contents:' || fc.indexOf('Cell Contents') === 0) break;
              /* Skip empty rows */
              var totalVal = cellNum(ws.getCell(r, totalCol));
              if (totalVal == null && String(ws.getCell(r, totalCol).value || '').trim() === '') continue;

              sections[sections.length - 1].dataRows.push(r);
            }
          }

          if (!sections.length) return;

          /* ── 5. For each section, extract counts and compute sig ── */
          sections.forEach(function (sec) {
            var baseCols = sec.baseCols;
            var counts = [];
            sec.dataRows.forEach(function (r) {
              var rowCounts = [];
              for (var ci = 0; ci < nCols; ci++) {
                var col = dataStartCol + ci * step;
                var val = cellNum(ws.getCell(r, col));
                /* If %-only mode, reconstruct count from percent and base */
                if (!isCountMode && val != null && baseCols[ci] > 0) {
                  val = Math.round(val * baseCols[ci] / 100);
                }
                rowCounts.push(val || 0);
              }
              counts.push(rowCounts);

            var sigResult = computeSigLetters(counts, baseCols, sigSettings.level, letterMap);

            /* ── 6. Append sig letters to the % column (keep N and % in separate columns) ── */
            for (var di = 0; di < sec.dataRows.length; di++) {
              var r = sec.dataRows[di];
              for (var ci = 0; ci < nCols; ci++) {
                var letters = sigResult[di] && sigResult[di][ci];
                if (!letters || !letters.length) continue;

                var sigText = letters.sort().join('');

                /* Determine which cell to append sig to */
                var nCol = dataStartCol + ci * step;
                var targetCol = (step === 2) ? nCol + 1 : nCol; /* % column if N+% mode, else N column */
                var targetCell = ws.getCell(r, targetCol);
                var oldVal = targetCell.value;

                /* Skip stat/mean rows (red font) */
                var origFont = targetCell.font || {};
                var isMeanRow = (origFont.color && origFont.color.argb && origFont.color.argb.indexOf('C00000') !== -1);
                if (isMeanRow) continue;

                if (oldVal == null || oldVal === '-') continue;

                var origColor = (origFont.color && origFont.color.argb) ? origFont.color.argb : 'FF000000';
                var origBold = origFont.bold || false;
                var origSize = origFont.size || 10;

                var origText;
                if (typeof oldVal === 'number') {
                  /* Format: % column → toFixed(1), N column → integer */
                  origText = (step === 2 || !isCountMode) ? oldVal.toFixed(1) : String(oldVal);
                } else if (typeof oldVal === 'object' && oldVal.richText) {
                  var rt = oldVal.richText.slice();
                  rt.push({ text: sigText, font: SIG_FONT });
                  targetCell.value = { richText: rt };
                  continue;
                } else {
                  origText = String(oldVal);
                }

                targetCell.value = {
                  richText: [
                    { text: origText, font: { bold: origBold, size: origSize, name: 'Calibri', color: { argb: origColor } } },
                    { text: sigText, font: SIG_FONT }
                  ]
                };
                targetCell.alignment = Object.assign({}, targetCell.alignment || {}, { horizontal: 'center', vertical: 'middle' });
              }

        });

      window.__cxInjectSigIntoWorkbook = injectSigIntoWorkbook;

      /* ══════════════════════════════════════════════════════
         PART C: MutationObserver — hook dispatch + enable btns
         ══════════════════════════════════════════════════════ */
      function detectDatasetKey() {
        var seeds = getFiberSeeds();
        for (var i = 0; i < seeds.length; i++) {
          var fiber = seeds[i] ? fiberOf(seeds[i]) : null;
          if (!fiber) continue;
          var ds = findDataset(fiber);
          if (ds && ds.variables && ds.variables.length > 0) {
            return ds.variables.length + ':' + ds.cases.length + ':' + ds.variables[0].name;

      var _obsTimer = null;

                 but keeps the same queue. Only reset if queue actually changed. */
              if (currentHook.queue !== _tablesHookRef.queue) {

                _hooked = false;
                _hookedHook = null;
                _tablesHookRef = null;
                _hookAttempts = 0;

                _tablesHookRef = currentHook;
                _hookedHook = currentHook;

              console.log('[S6] Hook lost (file change?), resetting...');
              _hooked = false;
              _hookedHook = null;
              _tablesHookRef = null;
              _hookAttempts = 0;

          enableNoTopRun();
          injectSwitchButton();

      }).observe(document.body, { childList: true, subtree: true });

      /* Initial attempts */
      setTimeout(function () { tryHookDispatch(); }, 1000);
      setTimeout(function () { tryHookDispatch(); }, 2500);
      setTimeout(function () { tryHookDispatch(); enableNoTopRun(); injectSwitchButton(); }, 4000);

      console.log('[S6] TB/T2B/Mean + no-TOP support loaded');

  <!-- S7: Hide Total column DOM manipulation for Grid variables with hideTotal=true
       + MA group label fix: look up parent variable label when group label = group name -->
  <script>
    (function () {
      'use strict';

      if (!window.__cxHideTotalVars) window.__cxHideTotalVars = {};
      /* Persistent state — if fiber lookup fails we keep last known value */
      if (window.__cxHideTotalActive === undefined) window.__cxHideTotalActive = false;

      /* ── Fiber helper ── */
      function _s7FiberOf(el) {
        var k = Object.keys(el).find(function(k) { return k.startsWith('__reactFiber'); });
        return k ? el[k] : null;
      }

      /* ── Dataset hook (for MA label patch) ── */
      function _s7GetDatasetHook() {
        try {
          var rows = document.querySelectorAll('[draggable="true"]');
          for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            if (!(row.className || '').includes('cursor-grab')) continue;
            var f = _s7FiberOf(row);
            while (f) {
              var s = f.memoizedState;
              while (s) {
                var v = s.memoizedState;
                if (v && typeof v === 'object' && !Array.isArray(v) &&
                  Array.isArray(v.variables) && Array.isArray(v.cases) &&
                  v.variables.length > 0) {
                  return { data: v, dispatch: s.queue.dispatch };
                }
                s = s.next;

      }

      /* ── MA group label fix ── */
      var _s7MaLabelVersion = null;
      function _s7FixMaGroupLabels() {
        var hook = _s7GetDatasetHook();
        if (!hook || !hook.data || !hook.data.variables) return;
        var vars = hook.data.variables;
        if (!vars.length) return;

        /* Version check to avoid re-processing same dataset */
        var ver = vars.length + '|' + (vars[0].name || '');
        if (ver === _s7MaLabelVersion) return;
        _s7MaLabelVersion = ver;

        /* Build lookup by name */
        var byName = {};
        vars.forEach(function(v) { if (v.name) byName[v.name] = v; });

        /* Find MA groups whose label equals their name (no proper label found) */
        var patches = [];
        vars.forEach(function(v) {
          if (!v.isGroupedMA) return;
          var curLabel = (v.label || '').trim();
          if (curLabel && curLabel !== v.name) return; // already has a real label

          /* Strategy 1: strip _O suffix → look for parent var */
          var s1 = v.name.replace(/_O$/, '');
          if (s1 !== v.name && byName[s1] && (byName[s1].label || '').trim() &&
              (byName[s1].label || '').trim() !== s1) {
            patches.push({ name: v.name, label: byName[s1].label.trim() });
            return;
          }

          /* Strategy 2: strip _R\d+_O or _R\d+ suffix */
          var s2 = v.name.replace(/_R\d+(_O)?$/, '');
          if (s2 !== v.name && byName[s2] && (byName[s2].label || '').trim() &&
              (byName[s2].label || '').trim() !== s2) {
            patches.push({ name: v.name, label: byName[s2].label.trim() });
            return;
          }

          /* Strategy 3: use first member variable's label (if it has one that differs from member name) */
          if (v.memberNames && v.memberNames.length > 0) {
            var firstM = byName[v.memberNames[0]];
            if (firstM && (firstM.label || '').trim() && (firstM.label || '').trim() !== firstM.name) {
              patches.push({ name: v.name, label: firstM.label.trim() });
              return;

            /* Strategy 4: strip member's $N or _N suffix to find parent */

            if (s4 !== mName && byName[s4] && (byName[s4].label || '').trim() &&

          var updated = prev.variables.map(function(v) {
            return patchMap[v.name] ? Object.assign({}, v, { label: patchMap[v.name] }) : v;
          });
          return Object.assign({}, prev, { variables: updated });
        });
      }

      /* ── Populate __cxHideTotalVars from dataset state (survives page reload / re-run) ── */
      function _cxPopulateHideTotalFromDataset() {
        var hook = _s7GetDatasetHook();
        if (!hook || !hook.data || !hook.data.variables) return;
        hook.data.variables.forEach(function(v) {

      /* ── Hide Total: DOM-based check — reads table <th> text vs __cxHideTotalVars keys ── */
      function _cxShouldHideTotalFromDOM() {
        if (!window.__cxHideTotalVars) return false;
        var tableEl = document.querySelector('.overflow-auto table');
        if (!tableEl) return false;
        var thead = tableEl.querySelector('thead');
        if (!thead) return false;
        var ths = thead.querySelectorAll('th');
        for (var i = 0; i < ths.length; i++) {
          var txt = (ths[i].textContent || '').trim();
          if (txt && window.__cxHideTotalVars[txt] === true) return true;
        }

      }

      function _cxApplyHideTotal() {
        var tableEl = document.querySelector('.overflow-auto table');
        if (!tableEl) return;

        var thead = tableEl.querySelector('thead');
        var colgroup = tableEl.querySelector('colgroup');
        if (!thead) return;

        var firstRow = thead.querySelector('tr:first-child');
        if (!firstRow) return;

        /* Total header is the 2nd th in the first header row (after corner cell) */
        var headerCells = firstRow.querySelectorAll('th');
        var totalTh = headerCells.length >= 2 ? headerCells[1] : null;
        if (!totalTh || (totalTh.textContent || '').trim() !== 'Total') {

        var cornerSpan = (headerCells[0] && headerCells[0].colSpan) || 2;
        var totalCol = colgroup ? (colgroup.querySelectorAll('col')[cornerSpan] || null) : null;

        /* Sub-header rows: first th is n= cell (Total sub-header) */
        var subHeaderCells = [];
        var headerRows = thead.querySelectorAll('tr');
        for (var ri = 1; ri < headerRows.length; ri++) {

           After normalizeRowStructure, data rows look like:
             row 0:  [section_label(rowSpan=N)] [category] [Total] [col1] …  → Total at cells[cornerSpan]
             row 1+: [category] [Total] [col1] …                              → Total at cells[cornerSpan-1]
           Base rows: [td(colSpan=cornerSpan,"Base")] [Total] [col1] …       → Total at cells[1] = cornerSpan-1 ✓
           We detect which case by checking whether cells[0].rowSpan > 1.    */
        var totalBodyCells = [];

          if (totalCol) {

          totalBodyCells.forEach(function(c) { c.style.display = 'none'; });
        } else {

            totalCol.style.removeProperty('width');
            totalCol.style.removeProperty('min-width');
            totalCol.style.removeProperty('max-width');

          if (totalTh) totalTh.style.removeProperty('display');
          subHeaderCells.forEach(function(c) { c.style.removeProperty('display'); });
          totalBodyCells.forEach(function(c) { c.style.removeProperty('display'); });

        if (!root) { setTimeout(_cxStartHideTotalObs, 500); return; }
        _cxHideTotalObs.observe(root, { childList: true, subtree: true });

      _cxStartHideTotalObs();

    })();
